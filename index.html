<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spark Estimator">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#156A50">
<title>Spark Estimator</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
  const _t = localStorage.getItem('spark_theme');
  if (_t === 'dark' || (!_t && matchMedia('(prefers-color-scheme: dark)').matches))
    document.documentElement.setAttribute('data-theme', 'dark');
</script>
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;overscroll-behavior:none;}
body{font-family:'Geist',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
button,input{font-family:inherit;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;}
::-webkit-scrollbar{width:0;height:0;}
.mono{font-family:'Geist Mono',monospace;font-variant-numeric:tabular-nums;}

:root {
  --bg:#F4F3EE; --fg:#161B18; --card:#FFFFFF;
  --muted:#ECEAE2; --muted2:#F4F3EE; --muted-fg:#6C7570;
  --border:#E3E1D7; --input-border:#D9D7CC;
  --primary:#156A50; --primary-fg:#FFFFFF; --primary-soft:#E4EFE9;
  --hero-grad:linear-gradient(140deg,#0C3629 0%,#14543F 52%,#1D7256 100%);
  --hero-fg:#F2F7F3; --hero-dim:rgba(242,247,243,.62); --hero-line:rgba(255,255,255,.16);
  --gold:#C9A25B; --gold-strong:#A5813E;
  --good:#177A53; --good-soft:#E5F3EC;
  --warn:#B97D18; --danger:#CE4B3F; --danger-soft:#FAECEA;
  --shadow:0 1px 2px rgba(20,25,22,.04),0 6px 20px rgba(20,25,22,.05);
  --shadow-lg:0 12px 44px rgba(20,25,22,.18);
  --ring:0 0 0 3.5px color-mix(in srgb,var(--primary) 15%,transparent);
  --pt-safe:env(safe-area-inset-top,0px);
  --pb-safe:env(safe-area-inset-bottom,0px);
  --pl-safe:max(14px,env(safe-area-inset-left,0px));
  --pr-safe:max(14px,env(safe-area-inset-right,0px));
}
[data-theme="dark"] {
  --bg:#0C100E; --fg:#EAEEEB; --card:#151A17;
  --muted:#1F2622; --muted2:#101411; --muted-fg:#909B95;
  --border:#262E29; --input-border:#2E372F;
  --primary:#3EBE8F; --primary-fg:#08130D; --primary-soft:#17342A;
  --hero-grad:linear-gradient(140deg,#10291F 0%,#154434 55%,#1B5A44 100%);
  --hero-fg:#F0F6F1; --hero-dim:rgba(240,246,241,.6); --hero-line:rgba(255,255,255,.13);
  --gold:#D8B472; --gold-strong:#E2C287;
  --good:#46C795; --good-soft:#122A20;
  --warn:#D9A544; --danger:#E8756A; --danger-soft:#331D1A;
  --shadow:0 1px 2px rgba(0,0,0,.45),0 6px 22px rgba(0,0,0,.3);
  --shadow-lg:0 14px 48px rgba(0,0,0,.55);
  --ring:0 0 0 3.5px color-mix(in srgb,var(--primary) 24%,transparent);
}

#root{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;background:var(--bg);}

/* Header */
.hdr{background:var(--card);border-bottom:1px solid var(--border);flex:none;padding-top:var(--pt-safe);}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:8px calc(var(--pr-safe) - 4px) 4px calc(var(--pl-safe) - 4px);}
.brand{display:flex;align-items:center;gap:7px;min-width:0;overflow:hidden;}
.brand img{height:19px;display:block;flex:none;}
[data-theme="dark"] .brand img{filter:brightness(0) invert(1);opacity:.92;}
.brand-name{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.brand-name em{font-style:normal;color:var(--muted-fg);}
.hdr-actions{display:flex;align-items:center;gap:0;flex:none;}
.icon-btn{width:38px;height:38px;flex:none;display:flex;align-items:center;justify-content:center;background:transparent;border:none;border-radius:12px;color:var(--muted-fg);cursor:pointer;padding:0;transition:background .15s,color .15s;}
.icon-btn:active{background:var(--muted);color:var(--fg);}
.icon-btn svg{display:block;flex:none;overflow:visible;}

/* Hero total card */
.hdr-total{margin:6px var(--pr-safe) 14px var(--pl-safe);padding:16px 18px 15px;border-radius:20px;background:var(--hero-grad);color:var(--hero-fg);position:relative;overflow:hidden;box-shadow:0 12px 32px -14px rgba(11,58,44,.6);}
.hdr-total::before{content:'';position:absolute;top:-70px;right:-40px;width:210px;height:210px;border-radius:50%;background:radial-gradient(closest-side,rgba(255,255,255,.13),transparent 70%);pointer-events:none;}
.hdr-total-label{font-size:10.5px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);}
.hdr-total-num{font-size:40px;font-weight:700;letter-spacing:-1.5px;line-height:1.05;margin-top:4px;color:var(--hero-fg);}
.hdr-meta{display:flex;align-items:center;gap:8px;margin-top:8px;position:relative;}
.hdr-proj-name{font-size:12.5px;font-weight:500;color:var(--hero-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.hdr-meta .icon-btn{width:30px;height:30px;border-radius:9px;color:var(--hero-dim);}
.hdr-meta .icon-btn:active{background:var(--hero-line);color:var(--hero-fg);}
.progress-bar{flex:1;height:5px;background:var(--hero-line);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:var(--gold);border-radius:99px;transition:width .4s ease;}
.progress-label{font-size:11px;font-weight:500;color:var(--hero-dim);white-space:nowrap;font-variant-numeric:tabular-nums;}

/* Section tabs */
.tabs{display:flex;gap:7px;padding:11px var(--pr-safe) 12px var(--pl-safe);overflow-x:auto;background:var(--card);flex:none;scrollbar-width:none;}
.tab-btn{flex:none;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:99px;font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--card);color:var(--muted-fg);cursor:pointer;transition:background .15s,color .15s,border-color .15s;white-space:nowrap;}
.tab-btn.active{background:var(--fg);color:var(--bg);border-color:var(--fg);}
.tab-amt{font-size:11px;font-weight:600;font-family:'Geist Mono',monospace;opacity:.7;}
.tab-btn.active .tab-amt{color:var(--gold);opacity:1;}

/* Room sub-tabs */
.room-tabs{display:flex;gap:7px;padding:11px var(--pr-safe) 3px var(--pl-safe);overflow-x:auto;background:var(--bg);flex:none;align-items:center;scrollbar-width:none;}
.rtab{display:flex;align-items:center;flex:none;border-radius:11px;border:1px solid var(--border);background:var(--card);overflow:hidden;transition:border-color .15s,background .15s;}
.rtab:has(.rtab-btn.active){border-color:color-mix(in srgb,var(--primary) 45%,var(--border));background:var(--primary-soft);}
.rtab-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;font-size:12.5px;font-weight:600;border:none;background:transparent;color:var(--muted-fg);cursor:pointer;white-space:nowrap;}
.rtab-btn.active{color:var(--primary);}
.rtab-amt{font-size:10.5px;font-family:'Geist Mono',monospace;opacity:.8;}
.rtab-remove{background:transparent;border:none;cursor:pointer;padding:8px 9px 8px 0;color:var(--muted-fg);display:flex;align-items:center;opacity:.7;}
.rtab-add{display:flex;align-items:center;gap:5px;flex:none;padding:8px 13px;border-radius:11px;font-size:12.5px;font-weight:600;background:transparent;border:1.5px dashed color-mix(in srgb,var(--primary) 40%,var(--border));color:var(--primary);cursor:pointer;white-space:nowrap;}

/* Scroll area */
.scroll-area{flex:1;overflow-y:auto;padding:14px var(--pr-safe) 14px var(--pl-safe);display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch;}
.scroll-area>*{flex:none;}

/* Groups */
.group-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);transition:border-color .2s;}
.group-card.has-items{border-color:color-mix(in srgb,var(--primary) 36%,var(--border));}
.group-header{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 15px;background:transparent;border:none;cursor:pointer;width:100%;text-align:left;color:var(--fg);}
.chev{color:var(--muted-fg);flex:none;display:flex;transition:transform .2s ease;}
.chev.open{transform:rotate(180deg);}
.group-label{font-size:14px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.group-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;background:var(--primary-soft);color:var(--primary);flex:none;}
.group-reviewed{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;background:var(--muted);color:var(--muted-fg);flex:none;}
.group-total{font-size:14px;font-weight:700;white-space:nowrap;flex:none;font-variant-numeric:tabular-nums;}
.group-total.has-val{color:var(--primary);}
.group-total.no-val{color:var(--border);}
.group-body{border-top:1px solid var(--border);animation:gbIn .18s ease;}
@keyframes gbIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}

/* Line items */
.item-row{padding:12px 15px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;}
.group-body>.item-row:last-of-type{border-bottom:none;}
.item-check{flex:none;width:24px;height:24px;border-radius:8px;border:1.5px solid var(--input-border);background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s;margin-top:1px;color:var(--primary-fg);}
.item-check.na{border-radius:99px;}
.item-check.checked{background:var(--primary);border-color:var(--primary);}
.item-body{flex:1;min-width:0;}
.item-head{display:flex;align-items:center;gap:10px;min-width:0;}
.item-tap{flex:1;min-width:0;cursor:pointer;user-select:none;-webkit-user-select:none;}
.item-name{font-size:13.5px;font-weight:600;line-height:1.35;transition:color .15s;overflow-wrap:break-word;word-break:break-word;}
.item-name.dim{color:var(--muted-fg);font-weight:500;}
.item-meta{font-size:11px;color:var(--muted-fg);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;font-family:'Geist Mono',monospace;}
.item-total{font-size:14px;font-weight:700;white-space:nowrap;flex:none;transition:color .15s;font-variant-numeric:tabular-nums;}
.item-total.has-val{color:var(--primary);}
.item-total.no-val{color:var(--border);}
.item-na-label{font-size:13px;font-weight:500;color:var(--muted-fg);cursor:pointer;user-select:none;-webkit-user-select:none;align-self:center;}
.item-na-label.checked{color:var(--primary);font-weight:600;}

/* Qty stepper */
.qty-row{display:flex;align-items:center;gap:10px;margin-top:11px;flex-wrap:wrap;}
.qty-stepper{display:flex;align-items:stretch;border:1px solid var(--input-border);border-radius:11px;background:var(--bg);overflow:hidden;}
.qty-stepper:focus-within{border-color:var(--primary);box-shadow:var(--ring);}
.qty-btn{width:38px;border:none;background:transparent;color:var(--muted-fg);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;}
.qty-btn:active{background:var(--muted);color:var(--fg);}
.qty-input{width:64px;height:40px;border:none;border-left:1px solid var(--input-border);border-right:1px solid var(--input-border);background:transparent;color:var(--fg);padding:0 6px;font-size:16px;font-family:'Geist Mono',monospace;text-align:center;outline:none;}
.qty-unit{font-size:12px;font-weight:500;color:var(--muted-fg);}
.qty-del{flex:none;background:transparent;border:none;cursor:pointer;color:var(--muted-fg);opacity:.5;padding:6px;display:flex;align-items:center;justify-content:center;border-radius:8px;}
.qty-del:active{opacity:1;color:var(--danger);background:var(--danger-soft);}

/* Photos */
.photos-section{margin-top:12px;padding-top:12px;border-top:1px dashed var(--border);}
.photos-header{display:flex;align-items:center;gap:7px;margin-bottom:9px;}
.photos-label{font-size:11px;font-weight:600;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.08em;}
.serial-badge{margin-left:auto;display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;font-family:'Geist Mono',monospace;background:var(--good-soft);color:var(--good);padding:3px 9px;border-radius:7px;border:none;cursor:pointer;}
.serial-add{margin-left:auto;display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;background:transparent;color:var(--muted-fg);padding:3px 9px;border-radius:7px;border:1px dashed var(--input-border);cursor:pointer;white-space:nowrap;}
.photos-grid{display:flex;gap:8px;flex-wrap:wrap;}
.photo-thumb{position:relative;flex:none;}
.photo-img{width:62px;height:62px;object-fit:cover;border-radius:11px;border:1px solid var(--border);display:block;}
.photo-del{position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;border:none;border-radius:99px;width:20px;height:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;box-shadow:0 2px 6px rgba(0,0,0,.25);}
.photo-add{width:62px;height:62px;flex:none;border-radius:11px;border:1.5px dashed color-mix(in srgb,var(--primary) 50%,var(--border));background:var(--primary-soft);color:var(--primary);cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Add item button */
.add-item-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;padding:12px;border:none;border-top:1px solid var(--border);background:var(--muted2);color:var(--muted-fg);font-size:12.5px;font-weight:600;cursor:pointer;transition:color .15s;}
.add-item-btn:active{color:var(--primary);}

/* Bottom nav */
.bottom-nav{flex:none;background:var(--card);border-top:1px solid var(--border);display:flex;gap:6px;padding:8px 10px calc(8px + var(--pb-safe));}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:none;border-radius:13px;cursor:pointer;padding:7px 0 6px;color:var(--muted-fg);transition:background .15s,color .15s;}
.nav-btn.active{color:var(--primary);background:var(--primary-soft);}
.nav-btn span{font-size:10.5px;font-weight:600;}

/* Overlays */
.overlay-bg{position:fixed;inset:0;background:rgba(10,14,12,.5);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);z-index:40;animation:fadeIn .2s ease;}
.overlay-bg.clear{background:transparent;backdrop-filter:none;-webkit-backdrop-filter:none;animation:none;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

/* Header menu */
.menu-pop{position:fixed;top:calc(var(--pt-safe) + 50px);right:10px;z-index:50;min-width:215px;background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-lg);padding:6px;animation:menuIn .18s cubic-bezier(.32,.72,0,1);transform-origin:top right;}
@keyframes menuIn{from{opacity:0;transform:translateY(-6px) scale(.96);}to{opacity:1;transform:none;}}
.menu-item{display:flex;align-items:center;gap:12px;width:100%;padding:11px 12px;border:none;background:transparent;color:var(--fg);font-size:13.5px;font-weight:600;cursor:pointer;border-radius:11px;text-align:left;transition:background .15s;}
.menu-item:active{background:var(--muted);}
.menu-item svg{color:var(--muted-fg);flex:none;}
.menu-item.danger{color:var(--danger);}
.menu-item.danger svg{color:var(--danger);}
.menu-sep{height:1px;background:var(--border);margin:5px 8px;}
.panel-slide{position:fixed;top:0;left:0;height:100%;width:320px;max-width:88vw;background:var(--card);z-index:50;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);transform:translateX(-100%);}
.panel-slide.open{transform:translateX(0);animation:panelIn .28s cubic-bezier(.4,0,.2,1);}
@keyframes panelIn{from{transform:translateX(-100%);}to{transform:translateX(0);}}
.panel-head{padding:calc(var(--pt-safe) + 16px) 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-size:16px;font-weight:700;letter-spacing:-.01em;}
.panel-foot{padding:14px 16px calc(14px + var(--pb-safe));border-top:1px solid var(--border);}
.sheet{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top-left-radius:26px;border-top-right-radius:26px;z-index:50;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);max-height:82vh;animation:sheetIn .3s cubic-bezier(.32,.72,0,1);}
@keyframes sheetIn{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet-handle{display:flex;justify-content:center;padding:10px 0 4px;}
.sheet-handle-bar{width:38px;height:4px;border-radius:99px;background:var(--border);}
.sheet-head{padding:6px 18px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.sheet-title{margin:0;font-size:16px;font-weight:700;letter-spacing:-.01em;}
.sheet-sub{margin:2px 0 0;font-size:12px;color:var(--muted-fg);}
.center-modal{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:24px;}
.modal-card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:22px;width:100%;max-width:330px;box-shadow:var(--shadow-lg);animation:modalIn .22s cubic-bezier(.32,.72,0,1);}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}

/* Fields & search */
.field-label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted-fg);}
.field-input{width:100%;border:1px solid var(--input-border);background:var(--bg);color:var(--fg);border-radius:11px;padding:11px 12px;font-size:15px;outline:none;transition:border-color .15s,box-shadow .15s;}
.field-input:focus{border-color:var(--primary);box-shadow:var(--ring);}
.search-wrap{display:flex;align-items:center;gap:8px;border:1px solid var(--input-border);border-radius:11px;padding:10px 12px;background:var(--bg);color:var(--muted-fg);transition:border-color .15s,box-shadow .15s;}
.search-wrap:focus-within{border-color:var(--primary);box-shadow:var(--ring);}
.search-wrap input{flex:1;min-width:0;border:none;background:transparent;color:var(--fg);font-size:13.5px;outline:none;}
.seg{display:flex;gap:4px;padding:4px;background:var(--muted);border-radius:11px;}
.seg-btn{flex:1;padding:8px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:transparent;color:var(--muted-fg);transition:background .15s,color .15s;}
.seg-btn.active{background:var(--card);color:var(--fg);box-shadow:var(--shadow);}
.empty-note{text-align:center;color:var(--muted-fg);font-size:13.5px;padding:32px 20px;}

/* 3D property model */
.house-card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:13px 15px 13px;overflow:hidden;}
.house-head{display:flex;align-items:center;gap:8px;}
.house-title{margin:0;font-size:13px;font-weight:700;}
.house-chip{font-size:10px;font-weight:700;letter-spacing:.08em;padding:2px 7px;border-radius:99px;background:var(--primary-soft);color:var(--primary);}
.house-hint{margin-left:auto;font-size:10.5px;color:var(--muted-fg);}
.house-scene{height:238px;display:flex;align-items:center;justify-content:center;perspective:950px;touch-action:pan-y;cursor:grab;user-select:none;-webkit-user-select:none;}
.house-scene:active{cursor:grabbing;}
.house-orbit{transform-style:preserve-3d;transform:rotateX(-22deg);}
.house-spin{transform-style:preserve-3d;animation:houseIdle 40s linear infinite;}
.house-spin.still{animation:none;}
@keyframes houseIdle{from{transform:rotateY(0deg);}to{transform:rotateY(360deg);}}
@media (prefers-reduced-motion:reduce){.house-spin{animation:none;}}
.house{position:relative;width:190px;height:86px;transform-style:preserve-3d;}
.hface{position:absolute;background:color-mix(in srgb,var(--card) 88%,var(--fg));border:1px solid color-mix(in srgb,var(--fg) 16%,transparent);cursor:pointer;}
.hf-front{left:0;top:-40px;width:190px;height:126px;transform:translateZ(65px);clip-path:polygon(0 31.75%,50% 0,100% 31.75%,100% 100%,0 100%);}
.hf-back{left:0;top:-40px;width:190px;height:126px;transform:rotateY(180deg) translateZ(65px);clip-path:polygon(0 31.75%,50% 0,100% 31.75%,100% 100%,0 100%);}
.hf-left{left:30px;top:0;width:130px;height:86px;transform:rotateY(-90deg) translateZ(95px);background:color-mix(in srgb,var(--card) 78%,var(--fg));}
.hf-right{left:30px;top:0;width:130px;height:86px;transform:rotateY(90deg) translateZ(95px);background:color-mix(in srgb,var(--card) 78%,var(--fg));}
.hf-roofF,.hf-roofB{left:-8px;top:-40px;width:206px;height:76px;transform-origin:top center;background:color-mix(in srgb,var(--card) 68%,var(--fg));border-radius:2px;}
.hf-roofF{transform:rotateX(58.4deg);}
.hf-roofB{transform:rotateX(-58.4deg);}
.hfill{position:absolute;left:0;right:0;bottom:0;height:calc(var(--p,0)*1%);background:linear-gradient(180deg,color-mix(in srgb,var(--primary) 28%,transparent),color-mix(in srgb,var(--primary) 60%,transparent));pointer-events:none;transition:height .5s ease;}
.hf-roofF .hfill,.hf-roofB .hfill{height:100%;opacity:calc(var(--p,0)/100*.85);transition:opacity .5s ease;}
.hfound{position:absolute;left:0;right:0;bottom:0;height:11px;background:color-mix(in srgb,var(--fg) 16%,var(--card));border-top:1px solid color-mix(in srgb,var(--fg) 20%,transparent);pointer-events:none;}
.hfound::after{content:'';position:absolute;inset:0;background:var(--primary);opacity:calc(var(--sp,0)/100*.72);transition:opacity .5s ease;}
.hwin{position:absolute;width:20px;height:24px;border:1.5px solid color-mix(in srgb,var(--fg) 32%,transparent);background:color-mix(in srgb,var(--gold) 16%,var(--bg));border-radius:2px;pointer-events:none;}
.hdoor{position:absolute;width:25px;height:42px;bottom:11px;left:50%;margin-left:-12.5px;border:1.5px solid color-mix(in srgb,var(--fg) 32%,transparent);border-bottom:none;background:color-mix(in srgb,var(--gold) 34%,var(--card));border-radius:3px 3px 0 0;pointer-events:none;}
.house-shadow{position:absolute;left:-35px;top:-4px;width:260px;height:180px;transform:rotateX(90deg);background:radial-gradient(50% 50% at 50% 50%,rgba(10,16,13,.3),transparent 68%);pointer-events:none;border:none;}
[data-theme="dark"] .house-shadow{background:radial-gradient(50% 50% at 50% 50%,rgba(0,0,0,.55),transparent 68%);}
.house-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px;}
.hleg{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--muted2);border-radius:99px;padding:6px 11px;font-size:11.5px;font-weight:600;color:var(--fg);cursor:pointer;}
.hleg-dot{width:8px;height:8px;border-radius:99px;flex:none;}
.hleg-pct{font-family:'Geist Mono',monospace;font-size:10.5px;color:var(--muted-fg);}

/* Summary */
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);}
.sum-header{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;background:var(--primary-soft);}
.sum-header-label{font-size:13px;font-weight:700;color:var(--primary);}
.sum-header-total{font-size:14px;font-weight:700;color:var(--primary);}
.sum-row{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:11px 15px;border-top:1px solid var(--border);}
.sum-row-name{font-size:13px;font-weight:500;}
.sum-row-sub{font-size:11px;color:var(--muted-fg);margin-top:2px;font-family:'Geist Mono',monospace;}
.sum-row-total{font-size:13.5px;font-weight:600;white-space:nowrap;font-variant-numeric:tabular-nums;}

/* Deal analyzer */
.deal-input-card{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:13px;box-shadow:var(--shadow);}
.deal-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-fg);}
.deal-input-wrap{display:flex;align-items:center;gap:3px;margin-top:5px;}
.deal-dollar{font-size:18px;color:var(--muted-fg);}
.deal-num-input{width:100%;border:none;background:transparent;color:var(--fg);font-size:20px;font-weight:600;font-family:'Geist Mono',monospace;outline:none;padding:0;}
.deal-row{display:flex;justify-content:space-between;align-items:center;padding:11px 15px;}
.deal-row-label{font-size:13px;color:var(--muted-fg);}
.deal-row-val{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;}

/* Price list */
.price-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.price-input-wrap{display:flex;align-items:center;gap:3px;border:1px solid var(--input-border);border-radius:10px;padding:7px 9px;background:var(--bg);transition:border-color .15s,box-shadow .15s;}
.price-input-wrap:focus-within{border-color:var(--primary);box-shadow:var(--ring);}
.price-dollar{font-size:13px;color:var(--muted-fg);}
.price-input{width:76px;border:none;background:transparent;color:var(--fg);font-size:16px;font-family:'Geist Mono',monospace;text-align:right;outline:none;}

/* Projects list */
.proj-row{display:flex;align-items:center;border-bottom:1px solid var(--border);transition:background .15s;}
.proj-row.active{background:var(--primary-soft);}
.proj-main{flex:1;text-align:left;background:transparent;border:none;cursor:pointer;padding:13px 16px;min-width:0;display:flex;flex-direction:column;gap:2px;}
.proj-name{display:flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:var(--fg);min-width:0;}
.proj-row.active .proj-name{color:var(--primary);}
.proj-dot{width:7px;height:7px;border-radius:99px;background:var(--primary);flex:none;}
.proj-sub{font-size:11.5px;color:var(--muted-fg);}
.proj-del{background:transparent;border:none;cursor:pointer;color:var(--muted-fg);opacity:.5;padding:14px;display:flex;}
.proj-del:active{opacity:1;color:var(--danger);}

/* Utils */
.txt-primary{color:var(--primary);}
.txt-muted{color:var(--muted-fg);}
.btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:13px;background:var(--primary);color:var(--primary-fg);border:none;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 8px 20px -10px color-mix(in srgb,var(--primary) 75%,transparent);transition:transform .1s;}
.btn-primary:active{transform:scale(.985);}
.btn-ghost{width:100%;padding:12px;border-radius:13px;background:transparent;border:1px solid var(--border);color:var(--fg);font-size:13.5px;font-weight:600;cursor:pointer;}
.btn-danger{width:100%;padding:12px;border-radius:13px;background:transparent;border:1px solid color-mix(in srgb,var(--danger) 35%,var(--border));color:var(--danger);font-size:13.5px;font-weight:600;cursor:pointer;}

/* Toast */
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);background:var(--fg);color:var(--bg);font-size:13px;font-weight:600;padding:11px 18px;border-radius:13px;box-shadow:var(--shadow-lg);z-index:90;white-space:nowrap;pointer-events:none;transition:opacity .3s;display:flex;align-items:center;gap:12px;max-width:calc(100vw - 32px);}
.toast.has-action{pointer-events:auto;}
.toast-action{background:transparent;border:none;color:var(--gold);font-size:13px;font-weight:700;cursor:pointer;padding:0;text-transform:uppercase;letter-spacing:.04em;}
[data-theme="dark"] .toast-action{color:#156A50;}
</style>

// =============================================================
const SK = 'spark_projects_v2';
const GK = 'spark_global_prices_v2';

function loadGlobalPrices() {
  try { return JSON.parse(localStorage.getItem(GK) || '{}'); } catch { return {}; }
}
function saveGlobalPrices() {
  try { localStorage.setItem(GK, JSON.stringify(S.globalPrices)); } catch {}
}

function loadAllProjects() {
  try { return JSON.parse(localStorage.getItem(SK) || '[]'); } catch { return []; }
}
function saveAllProjects(list) {
  try { localStorage.setItem(SK, JSON.stringify(list)); } catch {
    // Quota exceeded — retry without photos so the estimate itself survives
    try {
      localStorage.setItem(SK, JSON.stringify(list.map(p => ({...p, photos: {}}) )));
      showToast('Storage full — photos could not be saved');
    } catch {
      showToast('Storage full — could not save project');
    }
  }
}

function projectSnap() {
  return {
    id: S.projectId,
    name: S.projectName,
    savedAt: new Date().toISOString(),
    sections: S.sections,
    items: S.items,
    photos: S.photos,
    serials: S.serials,
    customItems: S.customItems,
    deletedItems: S.deletedItems,
    projPrices: S.projPrices,
    dealARV: S.dealARV,
    dealPurchase: S.dealPurchase,
    dealWeeks: S.dealWeeks,
  };
}

function saveCurrentProject() {
  if (!S.projectId) return;
  clearTimeout(_saveTimer);
  const list = loadAllProjects();
  const snap = projectSnap();
  const idx = list.findIndex(p => p.id === S.projectId);
  if (idx >= 0) list[idx] = snap; else list.unshift(snap);
  saveAllProjects(list);
}

let _saveTimer;
function scheduleSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveCurrentProject, 800);
}

function loadProjectIntoState(proj) {
  S.projectId   = proj.id;
  S.projectName = proj.name;
  S.sections    = proj.sections    || defaultSections();
  S.items       = proj.items       || {};
  S.photos      = proj.photos      || {};
  S.serials     = proj.serials     || {};
  S.customItems = proj.customItems || {};
  S.deletedItems= proj.deletedItems|| {};
  S.projPrices  = proj.projPrices  || {};
  S.dealARV     = proj.dealARV     || '';
  S.dealPurchase= proj.dealPurchase|| '';
  S.dealWeeks   = proj.dealWeeks   || 12;
  ensureItemKeys();
}

function defaultSections() {
  return {

    bathroom: {instances:[{id:'bath_1',     name:'Bathroom 1'},{id:'bath_2', name:'Bathroom 2'}]},
    systems:  {instances:[{id:'systems_1',  name:'Systems & Structure'}]},
    exterior: {instances:[{id:'exterior_1', name:'Exterior'}]},
    bedroom:  {instances:[]},
    living:   {instances:[]},
  };
}

function ensureItemKeys() {
  // Make sure all known items have a state entry
  for (const [stId, stDef] of Object.entries(SECTION_TYPES)) {
    const insts = S.sections[stId]?.instances || [];
    for (const inst of insts) {
      for (const gid of stDef.groups) {
        const g = GROUPS[gid];
        if (!g) continue;
        for (const iid of g.items) {
          const key = mkKey(inst.id, iid);
          if (!S.items[key]) S.items[key] = {checked:false, qty:''};
        }
      }
    }
  }
}

function mkKey(instId, itemId) { return `${instId}:${itemId}`; }
function parseKey(key) { const i = key.indexOf(':'); return [key.slice(0,i), key.slice(i+1)]; }

// =============================================================
// PRICE HELPERS
// =============================================================
function getPrice(itemId) {
  return S.projPrices[itemId] ?? S.globalPrices[itemId] ?? (PRICES[itemId]?.[1] ?? 0);
}
function getPriceDef(itemId) { return PRICES[itemId] || null; }
function getItemName(itemId) { return PRICES[itemId]?.[0] || itemId; }
function getItemUnit(itemId) { return PRICES[itemId]?.[2] || 'ea.'; }
function getItemMeta(itemId) { return PRICES[itemId]?.[3] || {}; }

// =============================================================
// CALCULATIONS
// =============================================================
function calcLineTotal(itemId, s) {
  if (!s?.checked) return 0;
  const qty = parseFloat(s.qty);
  if (!qty || qty <= 0) return 0;
  return qty * getPrice(itemId);
}

function findCustomDef(instId, itemId) {
  if (!itemId.startsWith('custom_')) return null;
  const prefix = instId + ':';
  for (const [k, arr] of Object.entries(S.customItems)) {
    if (!k.startsWith(prefix)) continue;
    const def = arr.find(c => c.id === itemId);
    if (def) return def;
  }
  return null;
}

// Line total for any item — standard (priced via getPrice) or custom
function calcItemTotal(instId, itemId) {
  const s = S.items[mkKey(instId, itemId)];
  const custom = findCustomDef(instId, itemId);
  if (!custom) return calcLineTotal(itemId, s);
  if (!s?.checked) return 0;
  const qty = parseFloat(s.qty);
  return qty > 0 ? qty * custom.cost : 0;
}

function calcGroupTotal(instId, gid, customItems) {
  const g = GROUPS[gid];
  if (!g) return 0;
  let t = 0;
  // Standard items — cost comes from PRICES via getPrice()
  for (const iid of g.items) {
    if (S.deletedItems[mkKey(instId, iid)]) continue;
    t += calcLineTotal(iid, S.items[mkKey(instId, iid)]);
  }
  // Custom items — cost comes from the custom definition, not PRICES
  for (const c of (customItems || [])) {
    const key = mkKey(instId, c.id);
    if (S.deletedItems[key]) continue;
    const s = S.items[key];
    if (!s?.checked) continue;
    const qty = parseFloat(s.qty);
    if (!qty || qty <= 0) continue;
    t += qty * c.cost;
  }
  return t;
}

function calcInstanceTotal(stId, instId) {
  const stDef = SECTION_TYPES[stId];
  if (!stDef) return 0;
  let t = 0;
  for (const gid of stDef.groups) {
    const custKey = `${instId}:${gid}`;
    t += calcGroupTotal(instId, gid, S.customItems[custKey]);
  }
  return t;
}

function calcSectionTotal(stId) {
  const insts = S.sections[stId]?.instances || [];
  return insts.reduce((sum, inst) => sum + calcInstanceTotal(stId, inst.id), 0);
}

function calcGrandTotal() {
  return Object.keys(SECTION_TYPES).reduce((s, stId) => s + calcSectionTotal(stId), 0);
}

function calcProgress() {
  let total = 0, done = 0;
  for (const [stId, stDef] of Object.entries(SECTION_TYPES)) {
    const insts = S.sections[stId]?.instances || [];
    for (const inst of insts) {
      for (const gid of stDef.groups) {
        total++;
        const g = GROUPS[gid];
        if (!g) continue;
        const allItems = [...g.items, ...((S.customItems[`${inst.id}:${gid}`]||[]).map(c=>c.id))];
        const anyChecked = allItems.some(iid => !S.deletedItems[mkKey(inst.id,iid)] && S.items[mkKey(inst.id,iid)]?.checked);
        const naChecked = S.items[`NA:${inst.id}:${gid}`]?.checked;
        if (anyChecked || naChecked) done++;
      }
    }
  }
  return {total, done};
}

// =============================================================
// FORMAT
// =============================================================
function fmt$(n) {
  const r = Math.round(n);
  return (r < 0 ? '-$' : '$') + Math.abs(r).toLocaleString('en-US');
}
function fmtDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); } catch { return ''; }
}

// =============================================================
// ACTIVE SECTIONS (tabs)
// =============================================================
function activeSections() {
  return Object.entries(SECTION_TYPES)
    .filter(([stId]) => (S.sections[stId]?.instances||[]).length > 0)
    .map(([stId, def]) => ({stId, def}));
}

      const tot = calcSectionTotal(stId);

        ${esc(def.label)}${tot>0?`<span class="tab-amt">${fmt$(tot)}</span>`:''}
      </button>`;

}

function renderRoomTabs(stId) {
  const insts = S.sections[stId]?.instances || [];
  if (!insts.length) return '';
  const stDef = SECTION_TYPES[stId];
  if (!stDef.multi) return '';
  return `<div class="room-tabs" id="room-tabs">
    ${insts.map((inst, i) => {
      const tot = calcInstanceTotal(stId, inst.id);
      const active = i === S.roomIdx;
      const minKeep = stId === 'bathroom' ? 1 : 0;
      return `<div class="rtab">
        <button class="rtab-btn${active?' active':''}" onclick="switchRoom(${i})">${esc(inst.name)}${tot>0?`<span class="rtab-amt mono">${fmt$(tot)}</span>`:''}</button>
        ${insts.length > minKeep ? `<button class="rtab-remove" onclick="removeRoom('${stId}',${i})" aria-label="Remove ${esc(inst.name)}">${ICONS.xs}</button>` : ''}
      </div>`;
    }).join('')}
    <button class="rtab-add" onclick="addRoom('${stId}')">${ICONS.plusSm} Add</button>
  </div>`;
}

// =============================================================
// RENDER - LINE ITEM
// =============================================================
function renderItem(instId, itemId, isCustom, custDef) {
  const key = mkKey(instId, itemId);
  if (S.deletedItems[key]) return '';
  const s = S.items[key] || {checked:false, qty:''};

  let name, unit, cost, flags;
  if (isCustom && custDef) {
    name  = custDef.name;
    unit  = custDef.unit;
    cost  = custDef.cost;
    flags = {};
  } else {
    const p = PRICES[itemId];
    if (!p) return '';
    name  = p[0];
    unit  = p[2];
    cost  = getPrice(itemId);
    flags = p[3] || {};
  }

  const tot = isCustom
    ? (s.checked && parseFloat(s.qty) > 0 ? parseFloat(s.qty)*cost : 0)
    : calcLineTotal(itemId, s);

  const costLabel = `$${cost.toLocaleString('en-US',{minimumFractionDigits:2})} / ${unit}`;

  return `
  <div class="item-row" data-key="${key}">
    <button class="item-check${s.checked?' checked':''}" onclick="toggleItem('${key}')" aria-label="${s.checked?'Uncheck':'Check'} ${esc(name)}">${s.checked?ICONS.check:''}</button>
    <div class="item-body">
      <div class="item-head">
        <div class="item-tap" onclick="toggleItem('${key}')">
          <div class="item-name${s.checked?'':' dim'}">${esc(name)}</div>
          <div class="item-meta">${costLabel}</div>
        </div>
        <span class="item-total ${tot>0?'has-val':'no-val'} mono">${tot>0?fmt$(tot):'—'}</span>
        <button class="qty-del" onclick="deleteItem('${key}')" aria-label="Remove ${esc(name)}">${ICONS.trash}</button>
      </div>
      ${s.checked ? `
      <div class="qty-row">
        <div class="qty-stepper">
          <button class="qty-btn" onclick="stepQty('${key}',-1)" aria-label="Decrease quantity">${ICONS.minus}</button>
          <input class="qty-input" type="number" inputmode="decimal" min="0" placeholder="0"
            value="${esc(s.qty)}" oninput="updateQty('${key}',this.value)">
          <button class="qty-btn" onclick="stepQty('${key}',1)" aria-label="Increase quantity">${ICONS.plus}</button>
        </div>
        <span class="qty-unit">${esc(unit)}</span>
      </div>
      ${flags.serial ? renderPhotos(key) : ''}
      ` : ''}
    </div>
  </div>`;
}

// =============================================================
// RENDER - GROUP
// =============================================================
function renderGroup(stId, instId, gid) {
  const g = GROUPS[gid];
  if (!g) return '';
  const custKey = `${instId}:${gid}`;
  const customs = S.customItems[custKey] || [];
  const exp = S.expandedGroups.has(custKey);
  const tot = calcGroupTotal(instId, gid, customs);
  const naKey = `NA:${instId}:${gid}`;
  const naChecked = S.items[naKey]?.checked;

  const allItems = [...g.items, ...customs.map(c=>c.id)];
  const checkedCount = allItems.filter(iid => !S.deletedItems[mkKey(instId,iid)] && S.items[mkKey(instId,iid)]?.checked).length;

  const label = g.label;
  const showBadge = checkedCount > 0 && !naChecked;

  return `
  <div class="group-card${checkedCount>0||naChecked?' has-items':''}" data-custkey="${custKey}">
    <button class="group-header" onclick="toggleGroup('${custKey}')">
      <div style="display:flex;align-items:center;gap:9px;flex:1;min-width:0;overflow:hidden;">
        <span class="chev${exp ? ' open' : ''}">${ICONS.chevron}</span>
        <span class="group-label">${esc(label)}</span>
        ${showBadge ? `<span class="group-badge">${ICONS.checkSm}${checkedCount}</span>` : ''}
        ${naChecked ? `<span class="group-reviewed">Reviewed</span>` : ''}
      </div>
      <span class="group-total ${tot>0?'has-val':'no-val'} mono">${tot>0?fmt$(tot):'—'}</span>
    </button>
    ${exp ? `
    <div class="group-body">
      ${renderNAItem(instId, gid)}
      ${g.items.map(iid => renderItem(instId, iid, false, null)).join('')}
      ${customs.map(c => renderItem(instId, c.id, true, c)).join('')}
      <button class="add-item-btn" onclick="openAddItem('${stId}','${gid}','${instId}')">
        ${ICONS.plus} Add line item
      </button>
    </div>
    ` : ''}
  </div>`;
}

// RENDER - WALKTHROUGH VIEW

function renderWalk() {
  const sects = activeSections();
  if (!sects.length) return `<div class="scroll-area" style="align-items:center;justify-content:center;"><p style="color:var(--muted-fg);font-size:14px;">Add a room to get started</p></div>`;

  const idx = Math.min(S.sectionIdx, sects.length-1);
  const {stId, def} = sects[idx];
  const stDef = SECTION_TYPES[stId];
  const insts = S.sections[stId]?.instances || [];

  let instId, roomTabsHTML = '';
  if (stDef.multi) {
    roomTabsHTML = renderRoomTabs(stId);
    const ri = Math.min(S.roomIdx, insts.length-1);
    instId = insts[ri]?.id;
  } else {
    instId = insts[0]?.id;
  }

  if (!instId) return `<div class="scroll-area"></div>`;

  const groups = stDef.groups.map(gid => renderGroup(stId, instId, gid)).join('');

  return roomTabsHTML + `
  <div class="scroll-area" id="scroll-area">
    <div style="height:2px;"></div>
    ${groups}
    <div style="height:80px;"></div>
  </div>`;
}

// =============================================================
// RENDER - 3D PROPERTY MODEL
// Pure CSS 3D (no libraries, works offline). Each part of the house
// maps to a walkthrough section and fills with color as the section
// progresses. Drag to rotate; tap a face or chip to jump there.
// =============================================================
const HOUSE_PARTS = [
  {id:'interior', label:'General',      sts:['interior']},
  {id:'kitchen',  label:'Kitchen',      sts:['kitchen']},
  {id:'bathroom', label:'Bathrooms',    sts:['bathroom']},
  {id:'rooms',    label:'Bed & Living', sts:['bedroom','living']},
  {id:'systems',  label:'Systems',      sts:['systems']},
  {id:'exterior', label:'Exterior',     sts:['exterior']},
];

function sectionProgressFor(stIds) {
  let total = 0, done = 0, cost = 0;
  for (const stId of stIds) {
    const stDef = SECTION_TYPES[stId];
    if (!stDef) continue;
    cost += calcSectionTotal(stId);
    for (const inst of (S.sections[stId]?.instances || [])) {
      for (const gid of stDef.groups) {
        const g = GROUPS[gid];
        if (!g) continue;
        total++;
        const all = [...g.items, ...((S.customItems[`${inst.id}:${gid}`]||[]).map(c=>c.id))];
        const any = all.some(iid => !S.deletedItems[mkKey(inst.id,iid)] && S.items[mkKey(inst.id,iid)]?.checked);
        if (any || S.items[`NA:${inst.id}:${gid}`]?.checked) done++;
      }
    }
  }
  return {total, done, cost, pct: total ? Math.round(done/total*100) : 0};
}

function renderHouse() {
  const P = {};
  for (const p of HOUSE_PARTS) P[p.id] = sectionProgressFor(p.sts);
  const ry = S.houseRY ?? -28;
  const sysP = P.systems.pct;
  const face = (cls, part, extra='') =>
    `<div class="hface ${cls}" data-part="${part}" style="--p:${P[part].pct}" onclick="goHousePart('${part}')">
      <span class="hfill"></span>${extra}
    </div>`;
  const found = `<span class="hfound" style="--sp:${sysP}"></span>`;

  const chips = HOUSE_PARTS.map(p => {
    const {pct, cost} = P[p.id];
    const dot = pct > 0
      ? `background:var(--primary);opacity:${(0.35 + pct*0.0065).toFixed(2)};`
      : `background:var(--border);`;
    return `<button class="hleg" onclick="goHousePart('${p.id}')">
      <span class="hleg-dot" style="${dot}"></span>${esc(p.label)}
      <span class="hleg-pct">${pct}%${cost>0?' · '+fmt$(cost):''}</span>
    </button>`;
  }).join('');

  return `
  <div class="house-card">
    <div class="house-head">
      <p class="house-title">Property model</p>
      <span class="house-chip">3D</span>
      <span class="house-hint">drag to rotate · tap to jump</span>
    </div>
    <div class="house-scene"
      onpointerdown="houseDown(event)" onpointermove="houseMove(event)"
      onpointerup="houseUp(event)" onpointercancel="houseUp(event)">
      <div class="house-orbit">
        <div class="house-spin${S.houseTouched ? ' still' : ''}">
          <div class="house" id="house3d" style="transform:rotateY(${ry}deg);">
            <div class="hface house-shadow"></div>
            ${face('hf-front','interior', `<span class="hwin" style="left:22px;bottom:26px;"></span><span class="hwin" style="right:22px;bottom:26px;"></span><span class="hdoor"></span>${found}`)}
            ${face('hf-back','bathroom', `<span class="hwin" style="left:30px;bottom:30px;"></span><span class="hwin" style="right:30px;bottom:30px;"></span>${found}`)}
            ${face('hf-right','kitchen', `<span class="hwin" style="left:24px;bottom:24px;"></span><span class="hwin" style="right:24px;bottom:24px;"></span>${found}`)}
            ${face('hf-left','rooms', `<span class="hwin" style="left:24px;bottom:24px;"></span><span class="hwin" style="right:24px;bottom:24px;"></span>${found}`)}
            ${face('hf-roofF','exterior')}
            ${face('hf-roofB','exterior')}
          </div>
        </div>
      </div>
    </div>
    <div class="house-legend">${chips}</div>
  </div>`;
}

// Drag-to-rotate. Rotation is patched directly on the transform so no
// re-render happens mid-drag; the angle lives in S so it survives renders.
let _houseActive = false, _houseStartX = 0, _houseBaseRY = 0, _houseMoved = false;
function houseDown(e) {
  _houseActive = true; _houseMoved = false;
  _houseStartX = e.clientX;
  _houseBaseRY = S.houseRY ?? -28;
  S.houseTouched = true;
  document.querySelector('.house-spin')?.classList.add('still');
  e.currentTarget.setPointerCapture?.(e.pointerId);
}
function houseMove(e) {
  if (!_houseActive) return;
  const dx = e.clientX - _houseStartX;
  if (Math.abs(dx) > 6) _houseMoved = true;
  S.houseRY = _houseBaseRY + dx * 0.45;
  const el = document.getElementById('house3d');
  if (el) el.style.transform = `rotateY(${S.houseRY}deg)`;
}
function houseUp() {
  _houseActive = false;
  setTimeout(() => { _houseMoved = false; }, 0); // let the trailing click land first
}
function goHousePart(id) {
  if (_houseMoved) return; // it was a drag, not a tap
  const part = HOUSE_PARTS.find(p => p.id === id);
  const sects = activeSections();
  for (const st of (part?.sts || [])) {
    const i = sects.findIndex(s => s.stId === st);
    if (i >= 0) { S.nav = 'walk'; S.sectionIdx = i; S.roomIdx = 0; render(); return; }
  }
  if (id === 'rooms') openRooms(); // no bedrooms/living yet — offer to add one
}

// =============================================================
function renderSummary() {
  const grand = calcGrandTotal();
  const photoCount = Object.values(S.photos).reduce((s,a)=>s+(a?.length||0),0);
  const sections = [];

  for (const [stId, stDef] of Object.entries(SECTION_TYPES)) {
    const insts = S.sections[stId]?.instances || [];
    for (const inst of insts) {
      const tot = calcInstanceTotal(stId, inst.id);
      if (!tot) continue;
      const rows = [];
      for (const gid of stDef.groups) {
        const g = GROUPS[gid];
        if (!g) continue;
        const custKey = `${inst.id}:${gid}`;
        const customs = S.customItems[custKey] || [];
        const allItems = [...g.items.map(iid=>({iid,custom:false})), ...customs.map(c=>({iid:c.id,custom:true,def:c}))];
        for (const {iid, custom, def} of allItems) {
          if (S.deletedItems[mkKey(inst.id,iid)]) continue;
          const s = S.items[mkKey(inst.id,iid)];
          if (!s?.checked || !parseFloat(s.qty)) continue;
          const cost = custom ? def.cost : getPrice(iid);
          const name = custom ? def.name : getItemName(iid);
          const unit = custom ? def.unit : getItemUnit(iid);
          const t = custom ? parseFloat(s.qty)*cost : calcLineTotal(iid, s);
          rows.push({name, sub:`${s.qty} ${unit} × $${cost.toLocaleString('en-US',{minimumFractionDigits:2})}`, total:t});
        }
      }
      sections.push({label: stDef.multi ? inst.name : stDef.label, total: tot, rows});
    }
  }

  return `
  <div class="scroll-area" id="scroll-area">
    <div style="padding:0 0 10px;">
      <p style="font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-fg);margin:0 0 4px;">Total Estimate</p>
      <p class="mono" style="font-size:38px;font-weight:700;letter-spacing:-1.5px;margin:0;">${fmt$(grand)}</p>
      <p style="font-size:12.5px;color:var(--muted-fg);margin:4px 0 0;">${esc(S.projectName)}</p>
      <button class="btn-primary" style="margin-top:16px;" onclick="openExport()">
        ${ICONS.export} Export ${photoCount > 0 ? 'ZIP (Excel + Photos)' : 'Excel Report'}
      </button>
    </div>
    ${renderHouse()}
    ${sections.length === 0
      ? `<div style="text-align:center;padding:40px 0;color:var(--muted-fg);font-size:14px;">No items selected yet.</div>`
      : sections.map(sc => `
      <div class="sum-card">
        <div class="sum-header">
          <span class="sum-header-label">${esc(sc.label)}</span>
          <span class="sum-header-total mono">${fmt$(sc.total)}</span>
        </div>
        ${sc.rows.map(r => `
        <div class="sum-row">
          <div style="min-width:0;"><p class="sum-row-name" style="margin:0;">${esc(r.name)}</p><p class="sum-row-sub" style="margin:0;">${esc(r.sub)}</p></div>
          <span class="sum-row-total mono">${fmt$(r.total)}</span>
        </div>`).join('')}
      </div>`).join('')}
    <div style="height:80px;"></div>
  </div>`;
}

function calcDeal() {
  const repairs = calcGrandTotal();
  const arv     = parseFloat(S.dealARV) || 0;
  const purchase= parseFloat(S.dealPurchase) || 0;
  const weeks   = parseInt(S.dealWeeks) || 12;
  const ready   = arv > 0 && purchase > 0; // no verdict until both numbers are in
  const holdCost = Math.round(purchase * 0.015 * (weeks / 52) * 12); // 1.5% monthly
  const basis   = purchase + repairs + holdCost;
  const profit  = arv - basis;
  const roi     = basis > 0 ? (profit / basis * 100) : 0;
  const verdict = profit > 15000 ? 'Strong deal' : profit > 0 ? 'Thin margin' : 'Losing deal';
  const vColor  = profit > 15000 ? 'var(--good)' : profit > 0 ? 'var(--warn)' : 'var(--danger)';
  const profitColor = profit > 0 ? 'var(--good)' : 'var(--danger)';
  const total = arv || (basis > 0 ? basis * 1.2 : 100000);
  const purW  = total ? Math.min((purchase/total)*100,100) : 0;
  const repW  = total ? Math.min((repairs/total)*100,100) : 0;
  const holW  = total ? Math.min((holdCost/total)*100,100) : 0;
  const proW  = total && profit > 0 ? Math.min((profit/total)*100,100) : 0;
  return {repairs, arv, purchase, weeks, ready, holdCost, basis, profit, roi, verdict, vColor, profitColor, purW, repW, holW, proW};
}

// Grand total for a saved project snapshot — used in the projects list so
// agents can tell properties apart at a glance.
function calcProjectTotal(proj) {
  const priceOf = id => proj.projPrices?.[id] ?? S.globalPrices[id] ?? (PRICES[id]?.[1] ?? 0);
  const customDefs = {};
  for (const arr of Object.values(proj.customItems || {}))
    for (const c of arr) customDefs[c.id] = c;
  let t = 0;
  for (const [key, st] of Object.entries(proj.items || {})) {
    if (key.startsWith('NA:') || !st?.checked || proj.deletedItems?.[key]) continue;
    const qty = parseFloat(st.qty);
    if (!qty || qty <= 0) continue;
    const [, itemId] = parseKey(key);
    const def = customDefs[itemId];
    t += qty * (def ? def.cost : priceOf(itemId));
  }
  return t;
}

function projectRowsHTML(list) {
  const q = (S.projSearch || '').trim().toLowerCase();
  const filtered = q ? list.filter(p => (p.name || '').toLowerCase().includes(q)) : list;
  if (!filtered.length)
    return `<p class="empty-note">${q ? 'No projects match your search' : 'No saved projects'}</p>`;
  return filtered.map(p => {
    const active = p.id === S.projectId;
    const tot = active ? calcGrandTotal() : calcProjectTotal(p);
    return `
    <div class="proj-row${active?' active':''}">
      <button class="proj-main" onclick="switchProject('${p.id}')">
        <span class="proj-name"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.name)}</span>${active?'<span class="proj-dot"></span>':''}</span>
        <span class="proj-sub">${fmtDate(p.savedAt)} · <span class="mono">${fmt$(tot)}</span></span>
      </button>
      ${!active?`<button class="proj-del" onclick="deleteProject('${p.id}')" aria-label="Delete ${esc(p.name)}">${ICONS.trash}</button>`:''}
    </div>`;
  }).join('');
}

function toggleGroup(custKey) {
  const scrollEl = document.getElementById('scroll-area');
  const st = scrollEl?.scrollTop || 0;
  const wasExpanded = S.expandedGroups.has(custKey);
  if (wasExpanded) S.expandedGroups.delete(custKey);
  else S.expandedGroups.add(custKey);
  render();
  requestAnimationFrame(() => {
    const sa = document.getElementById('scroll-area');
    if (!sa) return;
    if (wasExpanded) {
      sa.scrollTo(0, Math.min(st, sa.scrollHeight));
    } else {
      const card = sa.querySelector('[data-custkey="' + custKey + '"]');
      if (card) {
        const saRect = sa.getBoundingClientRect();
        const cardRect = card.getBoundingClientRect();
        const target = sa.scrollTop + cardRect.top - saRect.top - 10;
        sa.scrollTo({top: Math.max(0, target), behavior: 'smooth'});
      }
    }
  });
}

function toggleItem(key) {
  if (!S.items[key]) S.items[key] = {checked:false, qty:''};
  S.items[key].checked = !S.items[key].checked;

  scheduleSave();
  render();
  if (S.items[key]?.checked) {
    setTimeout(() => document.querySelector(`[data-key="${key}"] .qty-input`)?.focus(), 50);
  }
}
function clearNAForItem(key) {
  const [instId, itemId] = parseKey(key);
  for (const [stId, sec] of Object.entries(S.sections)) {
    if (!sec.instances?.some(i => i.id === instId)) continue;
    for (const gid of SECTION_TYPES[stId].groups) {
      const inGroup = GROUPS[gid]?.items.includes(itemId)
        || (S.customItems[`${instId}:${gid}`] || []).some(c => c.id === itemId);
      if (inGroup) {
        const na = S.items[`NA:${instId}:${gid}`];
        if (na?.checked) na.checked = false;
      }
    }
    return;
  }
}

  if (!S.items[key]) S.items[key] = {checked:false};
  S.items[key].checked = !S.items[key].checked;

  render();

// SERIAL NUMBER CAPTURE — manual entry + best-effort OCR scan
// =============================================================
function editSerial(key) {
  showPromptModal('Serial number', 'e.g. 4820A77', S.serials[key] || '', val => {
    // Strip any typed "S/N" prefix — the badge already labels it
    S.serials[key] = val.toUpperCase().replace(/^S\/?N[-:#.\s]*/,'');
    scheduleSave();
    render();
  });

let _tessPromise = null;
function loadTesseract() {
  if (window.Tesseract) return Promise.resolve(window.Tesseract);
  if (!_tessPromise) _tessPromise = new Promise((res, rej) => {
    const sc = document.createElement('script');
    sc.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js';
    sc.onload = () => res(window.Tesseract);
    sc.onerror = () => { _tessPromise = null; rej(new Error('offline')); };
    document.head.appendChild(sc);
  });
  return _tessPromise;
}

// Pull the most serial-looking token out of OCR text. Label formats vary, so
// prefer an explicit "S/N:" prefix, then fall back to long alphanumeric runs.
function extractSerial(text) {
  const up = String(text || '').toUpperCase();
  const tagged = up.match(/\b(?:S\/?N|SER(?:IAL)?\.?\s*(?:NO|NUM|#)?)[:.#\s]*([A-Z0-9][A-Z0-9\-]{4,})/);
  if (tagged) return tagged[1];
  const tokens = up.match(/\b[A-Z0-9][A-Z0-9\-]{6,}\b/g) || [];
  const cands = tokens.filter(t => (/\d/.test(t) && /[A-Z]/.test(t)) || /^[\d\-]{8,}$/.test(t));
  cands.sort((a, b) => b.length - a.length);
  return cands[0] || null;
}

async function scanSerial(key, dataUrl) {
  try {
    showToast('Scanning photo for serial…');
    const T = await loadTesseract();
    const {data} = await T.recognize(dataUrl, 'eng');
    const serial = extractSerial(data?.text);
    if (S.serials[key]) return; // user typed one while we were scanning
    if (serial) {
      S.serials[key] = serial;
      scheduleSave();
      if (!S.overlay) render();
      showToast(`Serial detected: ${serial}`, {label:'Edit', fn:() => editSerial(key)});
    } else {
      showToast('No serial found — tap “Serial no.” to add it');
    }
  } catch {
    // OCR unavailable (offline / CDN blocked) — manual entry still works
  }
}

  if (!proj) return;
  showPromptModal(`Delete "${proj.name}"?`, 'Type DELETE to confirm', '', val => {
    if (val.toUpperCase() !== 'DELETE') { showToast('Cancelled'); return; }
    saveAllProjects(loadAllProjects().filter(p => p.id !== id));
    render();
  }, 'Delete');
}

function newProject() {
  showPromptModal('New Project', 'e.g. 123 Main St', '', name => {
    saveCurrentProject();
    S.projectId = `proj_${Date.now()}`;
    S.projectName = name;
    S.sections = defaultSections();
    S.items = {}; S.photos = {}; S.serials = {}; S.customItems = {}; S.deletedItems = {};
    S.projPrices = {}; S.dealARV = ''; S.dealPurchase = ''; S.dealWeeks = 12;
    S.sectionIdx = 0; S.roomIdx = 0; S.nav = 'walk';
    S.expandedGroups = new Set();
    ensureItemKeys();
    saveCurrentProject();
    render();
  });
}

function renameProject() {
  showPromptModal('Rename Project', 'e.g. 123 Main St', S.projectName, name => {
    S.projectName = name;
    scheduleSave();
    render();
  });
}

// Room management
function findInstance(stId, instId) {
  return S.sections[stId]?.instances?.find(i => i.id === instId) || null;
}
function findInstanceName(instId) {
  for (const sec of Object.values(S.sections)) {
    const inst = sec.instances?.find(i => i.id === instId);
    if (inst) return inst.name;
  }
  return instId;
}
function addRoom(stId) {
  const stDef = SECTION_TYPES[stId];
  if (!stDef) return;
  const insts = S.sections[stId]?.instances || [];
  const singMap = {bathroom:'Bathroom', bedroom:'Bedroom', living:'Living Area'};
  const sing = singMap[stId] || stDef.label;
  const n = insts.length + 1;
  const id = `${stId}_${Date.now()}`;
  const name = `${sing} ${n}`;
  if (!S.sections[stId]) S.sections[stId] = {instances:[]};
  S.sections[stId].instances.push({id, name});
  // initialize item keys for new instance
  for (const gid of stDef.groups) {
    const g = GROUPS[gid];
    if (!g) continue;
    for (const iid of g.items) {
      const key = mkKey(id, iid);
      if (!S.items[key]) S.items[key] = {checked:false, qty:''};
    }
  }
  scheduleSave();
  S.overlay = null;
  // navigate to the new room if we're on a multi section
  const sects = activeSections();
  const si = sects.findIndex(s => s.stId === stId);
  if (si >= 0) {
    S.sectionIdx = si;
    S.roomIdx = S.sections[stId].instances.length - 1;
    S.nav = 'walk';
  }
  render();
}

function removeRoom(stId, idx) {
  const insts = S.sections[stId]?.instances || [];
  if (stId === 'bathroom' && insts.length <= 1) { showToast('Cannot remove last bathroom'); return; }
  const inst = insts[idx];
  if (!inst) return;
  insts.splice(idx, 1);
  // clean up item state for removed instance
  const prefix = inst.id + ':';
  for (const k of Object.keys(S.items)) { if (k.startsWith(prefix)) delete S.items[k]; }
  for (const k of Object.keys(S.photos)) { if (k.startsWith(prefix)) delete S.photos[k]; }
  for (const k of Object.keys(S.customItems)) { if (k.startsWith(prefix)) delete S.customItems[k]; }
  for (const k of Object.keys(S.serials)) { if (k.startsWith(prefix)) delete S.serials[k]; }
  S.roomIdx = Math.max(0, Math.min(S.roomIdx, insts.length - 1));
  scheduleSave();
  render();
}

function renameRoom(stId, idx) {
  const inst = S.sections[stId]?.instances?.[idx];
  if (!inst) return;
  showPromptModal('Rename Room', 'e.g. Master Bath', inst.name, name => {
    inst.name = name;
    scheduleSave();
    render();
  });
}

// =============================================================
// PARTIAL UPDATE (avoid full re-render on qty input)
// =============================================================
function updateTotalsInPlace(changedKey) {
  // Update line item total
  const card = document.querySelector(`[data-key="${changedKey}"]`);
  if (card) {
    const [instId, itemId] = parseKey(changedKey);
    const t = calcItemTotal(instId, itemId);
    const el = card.querySelector('.item-total');
    if (el) { el.textContent = t>0?fmt$(t):'—'; el.className = `item-total ${t>0?'has-val':'no-val'} mono`; }
    // also patch group total
    const groupCard = card.closest('.group-card');
    if (groupCard) {
      const custKey = groupCard.dataset.custkey;
      if (custKey) {
        const [gInstId, gid] = custKey.split(':');
        const gt = calcGroupTotal(gInstId, gid, S.customItems[custKey]);
        const gte = groupCard.querySelector('.group-total');
        if (gte) { gte.textContent = gt>0?fmt$(gt):'—'; gte.className = `group-total ${gt>0?'has-val':'no-val'} mono`; }
      }
    }
  }
  // Update grand total
  const gt = document.querySelector('.hdr-total-num');
  if (gt) gt.textContent = fmt$(calcGrandTotal());
  // Update progress
  const {total, done} = calcProgress();
  const pf = document.querySelector('.progress-fill');
  if (pf) pf.style.width = `${total?Math.round(done/total*100):0}%`;
  const pl = document.querySelector('.progress-label');
  if (pl) pl.textContent = `${done}/${total} groups`;
  // Update section tab subtotals
  const sects = activeSections();
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    if (i >= sects.length) return;
    const tot = calcSectionTotal(sects[i].stId);
    let amtEl = btn.querySelector('.tab-amt');
    if (tot > 0) {
      if (!amtEl) { amtEl = document.createElement('span'); amtEl.className = 'tab-amt'; btn.appendChild(amtEl); }
      amtEl.textContent = fmt$(tot);
    } else if (amtEl) {
      amtEl.remove();
    }
  });
}

// =============================================================
// IMAGE COMPRESSION
// =============================================================
function compressImage(file, maxDim=1600, q=0.82) {
  return new Promise(res => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const r = Math.min(maxDim/img.width, maxDim/img.height, 1);
        const c = document.createElement('canvas');
        c.width = Math.round(img.width*r); c.height = Math.round(img.height*r);
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        res(c.toDataURL('image/jpeg', q));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// =============================================================
// EXPORT
// =============================================================
async function doExport() {
  if (typeof XLSX === 'undefined' || typeof JSZip === 'undefined') {
    showToast('Export library not loaded — reconnect once and retry');
    return;
  }
  closeOverlay();
  showToast('Building export…');

  const wb = XLSX.utils.book_new();
  const ws = {};
  let row = 0;
  const merges = [];

  const s = (font, fill, align) => ({
    font: {name:'Calibri', ...font},
    fill: fill ? {patternType:'solid', fgColor:{rgb:fill}} : undefined,
    alignment: {wrapText:false, ...align},
  });
  const cell = (r, c, v, style, fmt) => {
    const addr = XLSX.utils.encode_cell({r, c});
    ws[addr] = {v, t:typeof v==='number'?'n':'s', s:style};
    if (fmt) ws[addr].z = fmt;
  };
  const merge = (r, c1, c2) => merges.push({s:{r, c:c1}, e:{r, c:c2}});

  // Title
  cell(row,0,'SPARK HOMES — REPAIR ESTIMATE', s({bold:true,sz:14,color:{rgb:'FFFFFF'}},'0C3629',{horizontal:'center',vertical:'center'}));
  merge(row,0,4); row++;
  cell(row,0,`Property: ${S.projectName}     Date: ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`,
    s({sz:10,color:{rgb:'6B7570'}},'F4F3EE',{horizontal:'center'}));
  merge(row,0,4); row++; row++;

  const processSection = (label, rows) => {
    if (!rows.length) return;
    cell(row,0,label.toUpperCase(), s({bold:true,sz:11,color:{rgb:'FFFFFF'}},'156A50',{vertical:'center'}));
    for (let c=1;c<5;c++) cell(row,c,'',s({},'156A50'));
    merge(row,0,4); row++;
    ['Repair Item','Unit','Unit Cost','Qty','Estimate'].forEach((h,c) =>
      cell(row,c,h, s({bold:true,sz:10},'E4EFE9',{horizontal:c>=2?'right':'left'})));
    row++;
    let secTot = 0;
    rows.forEach(({name, unit, cost, qty, total}) => {
      cell(row,0,name, s({sz:10},'FFFFFF'));
      cell(row,1,unit, s({sz:10},'FFFFFF'));
      cell(row,2,cost, s({sz:10},'FFFFFF',{horizontal:'right'}), '"$"#,##0.00');
      cell(row,3,parseFloat(qty)||0, s({sz:10},'FFFFFF',{horizontal:'right'}));
      cell(row,4,total, s({sz:10},'FFFFFF',{horizontal:'right'}), '"$"#,##0');
      secTot += total; row++;
    });
    cell(row,0,`${label} Total`, s({bold:true,sz:10,color:{rgb:'11553F'}},'E4EFE9'));
    merge(row,0,3);
    for (let c=1;c<4;c++) cell(row,c,'',s({},'E4EFE9'));
    cell(row,4,secTot, s({bold:true,sz:10,color:{rgb:'11553F'}},'E4EFE9',{horizontal:'right'}), '"$"#,##0');
    row++; row++;
  };

  for (const [stId, stDef] of Object.entries(SECTION_TYPES)) {
    const insts = S.sections[stId]?.instances || [];
    for (const inst of insts) {
      const rows = [];
      for (const gid of stDef.groups) {
        const g = GROUPS[gid];
        if (!g) continue;
        const custKey = `${inst.id}:${gid}`;
        const customs = S.customItems[custKey] || [];
        const allItems = [...g.items.map(iid=>({iid,custom:false})), ...customs.map(c=>({iid:c.id,custom:true,def:c}))];
        for (const {iid, custom, def} of allItems) {
          if (S.deletedItems[mkKey(inst.id,iid)]) continue;
          const ss = S.items[mkKey(inst.id,iid)];
          if (!ss?.checked || !parseFloat(ss.qty)) continue;
          const cost = custom ? def.cost : getPrice(iid);
          const name = custom ? def.name : getItemName(iid);
          const unit = custom ? def.unit : getItemUnit(iid);
          const total = custom ? parseFloat(ss.qty)*cost : calcLineTotal(iid, ss);
          rows.push({name, unit, cost, qty:ss.qty, total});
        }
      }
      const label = stDef.multi ? inst.name : stDef.label;
      processSection(label, rows);
    }
  }

  const grand = calcGrandTotal();
  cell(row,0,'TOTAL ESTIMATE', s({bold:true,sz:13,color:{rgb:'FFFFFF'}},'0C3629',{horizontal:'center'}));
  merge(row,0,3);
  for (let c=1;c<4;c++) cell(row,c,'',s({},'0C3629'));
  cell(row,4,grand, s({bold:true,sz:13,color:{rgb:'D8B472'}},'0C3629',{horizontal:'right'}), '"$"#,##0');

  // Captured serial numbers
  const serialEntries = Object.entries(S.serials||{}).filter(([,v]) => v);
  if (serialEntries.length) {
    row += 2;
    cell(row,0,'SERIAL NUMBERS', s({bold:true,sz:11,color:{rgb:'FFFFFF'}},'3A443F',{vertical:'center'}));
    for (let c=1;c<5;c++) cell(row,c,'',s({},'3A443F'));
    merge(row,0,4); row++;
    for (const [key, serial] of serialEntries) {
      const [instId, itemId] = parseKey(key);
      cell(row,0,getItemName(itemId), s({sz:10},'FFFFFF'));
      cell(row,1,findInstanceName(instId), s({sz:10},'FFFFFF'));
      cell(row,2,serial, s({sz:10,bold:true},'FFFFFF'));
      cell(row,3,'',s({},'FFFFFF')); cell(row,4,'',s({},'FFFFFF'));
      row++;
    }
    row--;
  }

  ws['!ref'] = XLSX.utils.encode_range({s:{r:0,c:0},e:{r:row,c:4}});
  ws['!cols'] = [38,16,12,10,14].map(w=>({wch:w}));
  ws['!merges'] = merges;
  XLSX.utils.book_append_sheet(wb, ws, 'Estimate');

  const baseName = `Repair-Estimate-${S.projectName.replace(/[^a-z0-9]/gi,'_')}-${new Date().toISOString().split('T')[0]}`;
  const photoEntries = Object.entries(S.photos||{}).filter(([,a])=>a?.length>0);

  if (!photoEntries.length) {
    XLSX.writeFile(wb, `${baseName}.xlsx`);
    showToast('Export complete');
    return;
  }

  const zip = new JSZip();
  zip.file(`${baseName}.xlsx`, XLSX.write(wb, {bookType:'xlsx', type:'array'}));
  const folder = zip.folder('photos');
  photoEntries.forEach(([key, photos]) => {
    const [instId, itemId] = parseKey(key);
    const clean = (str) => String(str).replace(/[^a-z0-9]/gi,'_').slice(0,30);
    const prefix = `${clean(findInstanceName(instId))}_${clean(getItemName(itemId) || itemId)}`;
    const serial = S.serials[key] ? `_SN-${clean(S.serials[key])}` : '';
    photos.forEach((ph, i) => {
      const ext = (ph.dataUrl.split(';')[0].split('/')[1]||'jpg').replace('jpeg','jpg');
      folder.file(`${prefix}${serial}_${i+1}.${ext}`, ph.dataUrl.split(',')[1], {base64:true});
    });
  });

  const blob = await zip.generateAsync({type:'blob'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${baseName}.zip`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showToast('Export complete');
}

// =============================================================
// TOAST
// =============================================================
let _toastTimer, _toastAction = null;
function showToast(msg, action) {
  let el = document.getElementById('toast');
  if (!el) { el = document.createElement('div'); el.id='toast'; document.body.appendChild(el); }
  _toastAction = action?.fn || null;
  el.className = action ? 'toast has-action' : 'toast';
  el.innerHTML = esc(msg) + (action ? `<button class="toast-action" onclick="runToastAction()">${esc(action.label)}</button>` : '');
  el.style.opacity = '1';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { if (el) { el.style.opacity='0'; el.className='toast'; } }, action ? 4000 : 2000);
}
function runToastAction() {
  const fn = _toastAction;
  _toastAction = null;
  const el = document.getElementById('toast');
  if (el) { el.style.opacity='0'; el.className='toast'; }
  if (fn) fn();
}

// =============================================================
// BOOT
// =============================================================
(function boot() {
  S.globalPrices = loadGlobalPrices();
  const projects = loadAllProjects();
  if (projects.length > 0) {
    loadProjectIntoState(projects[0]);
  } else {
    S.projectId   = `proj_${Date.now()}`;
    S.projectName = 'New Estimate';
    S.sections    = defaultSections();
    ensureItemKeys();
    saveCurrentProject();
  }
  render();
  // visibilitychange fires on document (it does not reach window in Safari)
  document.addEventListener('visibilitychange', () => { if (document.hidden) saveCurrentProject(); });
  window.addEventListener('pagehide', saveCurrentProject);
})();
</script>
