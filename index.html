<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
  const _t = localStorage.getItem('spark_theme');
  if (_t === 'dark' || (!_t && matchMedia('(prefers-color-scheme: dark)').matches))
    document.documentElement.setAttribute('data-theme', 'dark');
</script>
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;overscroll-behavior:none;}
body{font-family:'Geist',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;}
button,input{font-family:inherit;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;}
::-webkit-scrollbar{width:0;height:0;}
.mono{font-family:'Geist Mono',monospace;}

:root {
  --bg:#ffffff; --fg:#0b0b0d; --card:#ffffff;
  --muted:#f4f4f5; --muted2:#fafafa; --muted-fg:#71717a;
  --border:#e7e7ea; --input-border:#e4e4e7;
  --primary:#C2451E; --primary-fg:#ffffff; --primary-soft:#fbeae3;
  --good:#15803d; --good-soft:#effaf2;
  --shadow:0 1px 2px rgba(9,9,11,.06),0 4px 16px rgba(9,9,11,.07);
  --shadow-lg:0 8px 32px rgba(9,9,11,.12);
  --pt-safe:env(safe-area-inset-top,0px);
  --pb-safe:env(safe-area-inset-bottom,0px);
}
[data-theme="dark"] {
  --bg:#0a0a0c; --fg:#f4f4f5; --card:#161619;
  --muted:#222226; --muted2:#1b1b1f; --muted-fg:#9a9aa3;
  --border:#2a2a30; --input-border:#26262b;
  --primary:#DC5A2A; --primary-soft:#2a1812;
  --good:#22c55e; --good-soft:#10231a;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.3);
  --shadow-lg:0 8px 40px rgba(0,0,0,.5);
}

#root{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;background:var(--muted2);}

/* Header */
.hdr{background:var(--card);border-bottom:1px solid var(--border);flex:none;padding-top:var(--pt-safe);}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;}
.hdr-total{padding:4px 14px 14px;}
.hdr-total-label{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-fg);}
.hdr-total-num{font-size:38px;font-weight:700;letter-spacing:-1.5px;line-height:1;margin-top:2px;}
.hdr-meta{display:flex;align-items:center;gap:8px;margin-top:8px;}
.progress-bar{flex:1;height:5px;background:var(--muted);border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:var(--primary);border-radius:99px;transition:width .4s ease;}
.progress-label{font-size:11.5px;color:var(--muted-fg);white-space:nowrap;}

/* Tabs */
.tabs{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--border);flex:none;}
.tab-btn{flex:none;padding:6px 13px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap;}
.tab-btn.active{background:var(--primary);color:#fff;}
.tab-btn:not(.active){background:var(--muted);color:var(--muted-fg);}
.tab-amt{font-size:11px;margin-left:4px;opacity:.85;}

/* Room sub-tabs */
.room-tabs{display:flex;gap:5px;padding:8px 14px;overflow-x:auto;background:var(--muted2);border-bottom:1px solid var(--border);flex:none;align-items:center;}
.rtab{display:flex;align-items:center;gap:3px;flex:none;}
.rtab-btn{padding:5px 11px;border-radius:8px;font-size:12.5px;font-weight:600;border:none;cursor:pointer;transition:background .15s;white-space:nowrap;}
.rtab-btn.active{background:var(--primary);color:#fff;}
.rtab-btn:not(.active){background:var(--card);color:var(--fg);border:1px solid var(--border);}
.rtab-remove{background:transparent;border:none;cursor:pointer;padding:3px;color:var(--muted-fg);display:flex;align-items:center;}
.rtab-add{padding:5px 11px;border-radius:8px;font-size:12.5px;font-weight:600;background:transparent;border:1.5px dashed var(--border);color:var(--primary);cursor:pointer;white-space:nowrap;}

/* Scroll area */
.scroll-area{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}

/* Groups */
.group-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.group-card.has-items{border-color:color-mix(in srgb,var(--primary) 40%,var(--border));}
.group-header{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 14px;background:transparent;border:none;cursor:pointer;width:100%;text-align:left;color:var(--fg);}
.group-label{font-size:14px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.group-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;background:var(--primary-soft);color:var(--primary);flex:none;}
.group-reviewed{font-size:11px;font-weight:500;padding:2px 8px;border-radius:99px;background:var(--muted);color:var(--muted-fg);flex:none;}
.group-total{font-size:14px;font-weight:700;white-space:nowrap;flex:none;}
.group-total.has-val{color:var(--primary);}
.group-total.no-val{color:var(--border);}
.group-body{border-top:1px solid var(--border);animation:gbIn .16s ease;}
@keyframes gbIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}

/* Line items */
.item-row{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;}
.group-body>.item-row:last-of-type{border-bottom:none;}
.item-check{flex:none;width:22px;height:22px;border-radius:7px;border:2px solid var(--input-border);background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s;margin-top:1px;}
.item-check.na{border-radius:99px;}
.item-check.checked{background:var(--primary);border-color:var(--primary);}
.item-body{flex:1;min-width:0;}
.item-name{font-size:13.5px;font-weight:600;line-height:1.3;transition:color .15s;overflow-wrap:break-word;word-break:break-word;}
.item-name.dim{color:var(--muted-fg);}
.item-meta{font-size:11.5px;color:var(--muted-fg);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}
.item-total{font-size:14px;font-weight:700;white-space:nowrap;flex:none;transition:color .15s;}
.item-total.has-val{color:var(--primary);}
.item-total.no-val{color:var(--border);}
.item-na-label{font-size:13px;font-style:italic;color:var(--muted-fg);}
.item-na-label.checked{color:var(--primary);font-weight:500;font-style:normal;}

/* Qty row */
.qty-row{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;}
.qty-label{font-size:12px;color:var(--muted-fg);}
.qty-input{width:96px;border:1px solid var(--input-border);background:var(--bg);color:var(--fg);border-radius:9px;padding:8px 10px;font-size:16px;font-family:'Geist Mono',monospace;text-align:right;outline:none;transition:border-color .15s;}
.qty-input:focus{border-color:var(--primary);}
.qty-unit{font-size:12px;color:var(--muted-fg);}
.qty-del{flex:none;background:transparent;border:none;cursor:pointer;color:var(--muted-fg);opacity:.45;padding:4px;display:flex;align-items:center;justify-content:center;}

/* Photos */
.photos-section{margin-top:11px;padding-top:11px;border-top:1px dashed var(--border);}
.photos-header{display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.photos-label{font-size:11px;font-weight:600;color:var(--muted-fg);text-transform:uppercase;letter-spacing:.08em;}
.serial-badge{margin-left:auto;font-size:11px;font-weight:600;font-family:'Geist Mono',monospace;background:var(--good-soft);color:var(--good);padding:2px 8px;border-radius:6px;border:none;cursor:pointer;}
.serial-add{margin-left:auto;font-size:11px;font-weight:600;background:transparent;color:var(--muted-fg);padding:2px 8px;border-radius:6px;border:1px dashed var(--border);cursor:pointer;white-space:nowrap;}
.photos-grid{display:flex;gap:8px;flex-wrap:wrap;}
.photo-thumb{position:relative;flex:none;}
.photo-img{width:62px;height:62px;object-fit:cover;border-radius:10px;border:1px solid var(--border);display:block;}
.photo-del{position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;border:none;border-radius:99px;width:20px;height:20px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.photo-add{width:62px;height:62px;flex:none;border-radius:10px;border:1.5px dashed var(--primary);background:var(--primary-soft);color:var(--primary);cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Add item button */
.add-item-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;padding:11px;border:none;border-top:1px solid var(--border);background:transparent;color:var(--muted-fg);font-size:12.5px;font-weight:600;cursor:pointer;}

/* Bottom nav */
.bottom-nav{flex:none;background:var(--card);border-top:1px solid var(--border);display:flex;padding:6px 0;padding-bottom:calc(6px + var(--pb-safe));}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:none;cursor:pointer;padding:5px 0;color:var(--muted-fg);transition:color .15s;}
.nav-btn.active{color:var(--primary);}
.nav-btn span{font-size:10.5px;font-weight:600;}

/* Overlays */
.overlay-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.panel-slide{position:fixed;top:0;left:0;height:100%;width:290px;background:var(--card);z-index:50;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);transform:translateX(-100%);}
.panel-slide.open{transform:translateX(0);animation:panelIn .28s cubic-bezier(.4,0,.2,1);}
@keyframes panelIn{from{transform:translateX(-100%);}to{transform:translateX(0);}}
.sheet{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top-left-radius:24px;border-top-right-radius:24px;z-index:50;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);max-height:82vh;animation:sheetIn .3s cubic-bezier(.32,.72,0,1);}
@keyframes sheetIn{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet-handle{display:flex;justify-content:center;padding:10px 0 4px;}
.sheet-handle-bar{width:38px;height:4px;border-radius:99px;background:var(--border);}
.center-modal{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:24px;}
.modal-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px;width:100%;max-width:320px;box-shadow:var(--shadow-lg);animation:modalIn .22s cubic-bezier(.32,.72,0,1);}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}

/* Summary */
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.sum-header{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--primary-soft);}
.sum-header-label{font-size:13px;font-weight:700;color:var(--primary);}
.sum-header-total{font-size:14px;font-weight:700;color:var(--primary);}
.sum-row{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:11px 14px;border-top:1px solid var(--border);}
.sum-row-name{font-size:13px;font-weight:500;}
.sum-row-sub{font-size:11.5px;color:var(--muted-fg);margin-top:1px;}
.sum-row-total{font-size:13.5px;font-weight:600;white-space:nowrap;}

/* Deal analyzer */
.deal-input-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:12px;}
.deal-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-fg);}
.deal-input-wrap{display:flex;align-items:center;gap:3px;margin-top:5px;}
.deal-dollar{font-size:18px;color:var(--muted-fg);}
.deal-num-input{width:100%;border:none;background:transparent;color:var(--fg);font-size:20px;font-weight:600;font-family:'Geist Mono',monospace;outline:none;padding:0;}
.deal-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;}
.deal-row-label{font-size:13px;color:var(--muted-fg);}
.deal-row-val{font-size:13px;font-weight:600;}

/* Price list */
.price-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.price-input-wrap{display:flex;align-items:center;gap:3px;border:1px solid var(--input-border);border-radius:9px;padding:6px 9px;background:var(--bg);}
.price-dollar{font-size:13px;color:var(--muted-fg);}
.price-input{width:76px;border:none;background:transparent;color:var(--fg);font-size:16px;font-family:'Geist Mono',monospace;text-align:right;outline:none;}

/* Projects list */
.proj-row{display:flex;align-items:center;border-bottom:1px solid var(--border);}
.proj-row.active{background:var(--primary-soft);}

/* Utils */
.txt-primary{color:var(--primary);}
.txt-muted{color:var(--muted-fg);}
.btn-primary{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px;border-radius:11px;background:var(--primary);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;}
.btn-ghost{width:100%;padding:11px;border-radius:11px;background:transparent;border:1px solid var(--border);color:var(--fg);font-size:13.5px;font-weight:600;cursor:pointer;}
.btn-danger{width:100%;padding:11px;border-radius:11px;background:transparent;border:1px solid #fecaca;color:#ef4444;font-size:13.5px;font-weight:600;cursor:pointer;}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--fg);color:var(--bg);font-size:13px;font-weight:600;padding:10px 18px;border-radius:11px;box-shadow:var(--shadow-lg);z-index:90;white-space:nowrap;pointer-events:none;transition:opacity .3s;display:flex;align-items:center;gap:12px;}
.toast.has-action{pointer-events:auto;}
.toast-action{background:transparent;border:none;color:var(--primary);font-size:13px;font-weight:700;cursor:pointer;padding:0;text-transform:uppercase;letter-spacing:.04em;}

/* Icon helpers */
.icon{display:block;flex-shrink:0;}
</style>
</head>

function ensureItemKeys() {
  // Make sure all known items have a state entry
  for (const [stId, stDef] of Object.entries(SECTION_TYPES)) {
    const insts = S.sections[stId]?.instances || [];
    for (const inst of insts) {
      for (const gid of stDef.groups) {
        const g = GROUPS[gid];
        if (!g) continue;
        for (const iid of g.items) {
          const key = mkKey(inst.id, iid);
          if (!S.items[key]) S.items[key] = {checked:false, qty:''};
        }
      }
    }
  }
}

function mkKey(instId, itemId) { return `${instId}:${itemId}`; }
function parseKey(key) { const i = key.indexOf(':'); return [key.slice(0,i), key.slice(i+1)]; }

// =============================================================
// PRICE HELPERS
// =============================================================
function getPrice(itemId) {
  return S.projPrices[itemId] ?? S.globalPrices[itemId] ?? (PRICES[itemId]?.[1] ?? 0);
}
function getPriceDef(itemId) { return PRICES[itemId] || null; }
function getItemName(itemId) { return PRICES[itemId]?.[0] || itemId; }
function getItemUnit(itemId) { return PRICES[itemId]?.[2] || 'ea.'; }
function getItemMeta(itemId) { return PRICES[itemId]?.[3] || {}; }

// =============================================================
// CALCULATIONS
// =============================================================
function calcLineTotal(itemId, s) {
  if (!s?.checked) return 0;
  const qty = parseFloat(s.qty);
  if (!qty || qty <= 0) return 0;
  return qty * getPrice(itemId);
}

function findCustomDef(instId, itemId) {
  if (!itemId.startsWith('custom_')) return null;
  const prefix = instId + ':';
  for (const [k, arr] of Object.entries(S.customItems)) {
    if (!k.startsWith(prefix)) continue;
    const def = arr.find(c => c.id === itemId);
    if (def) return def;
  }
  return null;
}

// Line total for any item — standard (priced via getPrice) or custom
function calcItemTotal(instId, itemId) {
  const s = S.items[mkKey(instId, itemId)];
  const custom = findCustomDef(instId, itemId);
  if (!custom) return calcLineTotal(itemId, s);
  if (!s?.checked) return 0;
  const qty = parseFloat(s.qty);
  return qty > 0 ? qty * custom.cost : 0;
}

function calcGroupTotal(instId, gid, customItems) {
  const g = GROUPS[gid];
  if (!g) return 0;
  let t = 0;
  // Standard items — cost comes from PRICES via getPrice()
  for (const iid of g.items) {
    if (S.deletedItems[mkKey(instId, iid)]) continue;
    t += calcLineTotal(iid, S.items[mkKey(instId, iid)]);
  }
  // Custom items — cost comes from the custom definition, not PRICES
  for (const c of (customItems || [])) {
    const key = mkKey(instId, c.id);
    if (S.deletedItems[key]) continue;
    const s = S.items[key];
    if (!s?.checked) continue;
    const qty = parseFloat(s.qty);
    if (!qty || qty <= 0) continue;
    t += qty * c.cost;
  }
  return t;
}

function calcInstanceTotal(stId, instId) {
  const stDef = SECTION_TYPES[stId];
  if (!stDef) return 0;
  let t = 0;
  for (const gid of stDef.groups) {
    const custKey = `${instId}:${gid}`;
    t += calcGroupTotal(instId, gid, S.customItems[custKey]);
  }
  return t;
}

function calcSectionTotal(stId) {
  const insts = S.sections[stId]?.instances || [];
  return insts.reduce((sum, inst) => sum + calcInstanceTotal(stId, inst.id), 0);
}

function calcGrandTotal() {
  return Object.keys(SECTION_TYPES).reduce((s, stId) => s + calcSectionTotal(stId), 0);
}

function calcProgress() {
  let total = 0, done = 0;
  for (const [stId, stDef] of Object.entries(SECTION_TYPES)) {
    const insts = S.sections[stId]?.instances || [];
    for (const inst of insts) {
      for (const gid of stDef.groups) {
        total++;
        const g = GROUPS[gid];
        if (!g) continue;
        const allItems = [...g.items, ...((S.customItems[`${inst.id}:${gid}`]||[]).map(c=>c.id))];
        const anyChecked = allItems.some(iid => !S.deletedItems[mkKey(inst.id,iid)] && S.items[mkKey(inst.id,iid)]?.checked);
        const naChecked = S.items[`NA:${inst.id}:${gid}`]?.checked;
        if (anyChecked || naChecked) done++;
      }
    }
  }
  return {total, done};
}

function h(tag, attrs, ...children) {
  const a = Object.entries(attrs||{}).map(([k,v]) => v===true?k:v!==false&&v!=null?`${k}="${String(v).replace(/"/g,'&quot;')}"`:``).filter(Boolean).join(' ');
  const inner = children.flat().filter(c=>c!=null&&c!==false).join('');
  if (['input','img','br','hr'].includes(tag)) return `<${tag}${a?' '+a:''}>`;
  return `<${tag}${a?' '+a:''}>${inner}</${tag}>`;
}

      const tot = calcInstanceTotal(stId, inst.id);
      const active = i === S.roomIdx;
      const minKeep = stId === 'bathroom' ? 1 : 0;
      return `<div class="rtab">

    }).join('')}

  </div>`;
}

// =============================================================
// RENDER - LINE ITEM
// =============================================================
function renderItem(instId, itemId, isCustom, custDef) {
  const key = mkKey(instId, itemId);
  if (S.deletedItems[key]) return '';
  const s = S.items[key] || {checked:false, qty:''};

  let name, unit, cost, flags;
  if (isCustom && custDef) {
    name  = custDef.name;
    unit  = custDef.unit;
    cost  = custDef.cost;
    flags = {};
  } else {
    const p = PRICES[itemId];
    if (!p) return '';
    name  = p[0];
    unit  = p[2];
    cost  = getPrice(itemId);
    flags = p[3] || {};
  }

  const tot = isCustom
    ? (s.checked && parseFloat(s.qty) > 0 ? parseFloat(s.qty)*cost : 0)
    : calcLineTotal(itemId, s);

  const costLabel = `$${cost.toLocaleString('en-US',{minimumFractionDigits:2})} / ${unit}`;
  const minNote = flags.min ? ` · min ${fmt$(flags.min)}` : '';

  return `
  <div class="item-row" data-key="${key}">
    <button class="item-check${s.checked?' checked':''}" onclick="toggleItem('${key}')" style="margin-top:1px;">${s.checked?ICONS.check.replace('currentColor','#fff'):''}</button>
    <div class="item-body">
      <div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start;">
        <span class="item-name${s.checked?'':' dim'}" style="flex:1;min-width:0;">${esc(name)}</span>
        <span class="item-total ${tot>0?'has-val':'no-val'} mono">${tot>0?fmt$(tot):'—'}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;min-width:0;">
        <span class="item-meta">${costLabel}${minNote}</span>
        <button class="qty-del" onclick="deleteItem('${key}')" title="Remove item" style="flex:none;">${ICONS.trash}</button>
      </div>
      ${s.checked ? `
      <div class="qty-row">
        <span class="qty-label">Qty</span>
        <input class="qty-input" type="number" inputmode="decimal" placeholder="0"
          value="${esc(s.qty)}" oninput="updateQty('${key}',this.value)">
        <span class="qty-unit">${esc(unit)}</span>
      </div>
      ${flags.serial ? renderPhotos(key) : ''}
      ` : ''}
    </div>
  </div>`;
}

// =============================================================
// RENDER - GROUP
// =============================================================
function renderGroup(stId, instId, gid) {
  const g = GROUPS[gid];
  if (!g) return '';
  const custKey = `${instId}:${gid}`;
  const customs = S.customItems[custKey] || [];
  const exp = S.expandedGroups.has(custKey);
  const tot = calcGroupTotal(instId, gid, customs);
  const naKey = `NA:${instId}:${gid}`;
  const naChecked = S.items[naKey]?.checked;

  const allItems = [...g.items, ...customs.map(c=>c.id)];
  const checkedCount = allItems.filter(iid => !S.deletedItems[mkKey(instId,iid)] && S.items[mkKey(instId,iid)]?.checked).length;

  const label = g.label;
  const showBadge = checkedCount > 0 && !naChecked;

  return `
  <div class="group-card${checkedCount>0||naChecked?' has-items':''}" data-custkey="${custKey}">
    <button class="group-header" onclick="toggleGroup('${custKey}')">
      <div style="display:flex;align-items:center;gap:9px;flex:1;min-width:0;overflow:hidden;">
        <span style="color:var(--muted-fg);flex:none;">${exp ? ICONS.up : ICONS.down}</span>
        <span class="group-label">${esc(label)}</span>
        ${showBadge ? `<span class="group-badge">${checkedCount} ✓</span>` : ''}
        ${naChecked ? `<span class="group-reviewed">reviewed</span>` : ''}
      </div>
      <span class="group-total ${tot>0?'has-val':'no-val'} mono">${tot>0?fmt$(tot):'—'}</span>
    </button>
    ${exp ? `
    <div class="group-body">
      ${renderNAItem(instId, gid)}
      ${g.items.map(iid => renderItem(instId, iid, false, null)).join('')}
      ${customs.map(c => renderItem(instId, c.id, true, c)).join('')}
      <button class="add-item-btn" onclick="openAddItem('${stId}','${gid}','${instId}')">
        ${ICONS.plus} Add line item
      </button>
    </div>
    ` : ''}
  </div>`;
}

// =============================================================
function renderWalk() {
  const sects = activeSections();
  if (!sects.length) return `<div class="scroll-area" style="align-items:center;justify-content:center;"><p style="color:var(--muted-fg);font-size:14px;">Add a room to get started</p></div>`;

  const idx = Math.min(S.sectionIdx, sects.length-1);
  const {stId, def} = sects[idx];
  const stDef = SECTION_TYPES[stId];
  const insts = S.sections[stId]?.instances || [];

  let instId, roomTabsHTML = '';
  if (stDef.multi) {
    roomTabsHTML = renderRoomTabs(stId);
    const ri = Math.min(S.roomIdx, insts.length-1);
    instId = insts[ri]?.id;
  } else {
    instId = insts[0]?.id;
  }

  if (!instId) return `<div class="scroll-area"></div>`;

  const groups = stDef.groups.map(gid => renderGroup(stId, instId, gid)).join('');

  return roomTabsHTML + `
  <div class="scroll-area" id="scroll-area">
    <div style="height:2px;"></div>
    ${groups}
    <div style="height:80px;"></div>
  </div>`;
}

// =============================================================
// RENDER - SUMMARY VIEW
// =============================================================
function renderSummary() {
  const grand = calcGrandTotal();
  const sections = [];

  for (const [stId, stDef] of Object.entries(SECTION_TYPES)) {
    const insts = S.sections[stId]?.instances || [];
    for (const inst of insts) {
      const tot = calcInstanceTotal(stId, inst.id);
      if (!tot) continue;
      const rows = [];
      for (const gid of stDef.groups) {
        const g = GROUPS[gid];
        if (!g) continue;
        const custKey = `${inst.id}:${gid}`;
        const customs = S.customItems[custKey] || [];
        const allItems = [...g.items.map(iid=>({iid,custom:false})), ...customs.map(c=>({iid:c.id,custom:true,def:c}))];
        for (const {iid, custom, def} of allItems) {
          if (S.deletedItems[mkKey(inst.id,iid)]) continue;
          const s = S.items[mkKey(inst.id,iid)];
          if (!s?.checked || !parseFloat(s.qty)) continue;
          const cost = custom ? def.cost : getPrice(iid);
          const name = custom ? def.name : getItemName(iid);
          const unit = custom ? def.unit : getItemUnit(iid);
          const t = custom ? parseFloat(s.qty)*cost : calcLineTotal(iid, s);
          rows.push({name, sub:`${s.qty} ${unit} × $${cost.toLocaleString('en-US',{minimumFractionDigits:2})}`, total:t});
        }
      }
      sections.push({label: stDef.multi ? inst.name : stDef.label, total: tot, rows});
    }
  }

  return `
  <div class="scroll-area" id="scroll-area">
    <div style="padding:0 0 10px;">
      <p style="font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-fg);margin:0 0 4px;">Total Estimate</p>
      <p class="mono" style="font-size:38px;font-weight:700;letter-spacing:-1.5px;margin:0;">${fmt$(grand)}</p>
      <p style="font-size:12.5px;color:var(--muted-fg);margin:4px 0 0;">${esc(S.projectName)}</p>
      <button class="btn-primary" style="margin-top:14px;" onclick="openExport()">
        ${ICONS.export} Export ZIP (Excel + Photos)
      </button>
    </div>
    ${sections.length === 0
      ? `<div style="text-align:center;padding:40px 0;color:var(--muted-fg);font-size:14px;">No items selected yet.</div>`
      : sections.map(sc => `
      <div class="sum-card">
        <div class="sum-header">
          <span class="sum-header-label">${esc(sc.label)}</span>
          <span class="sum-header-total mono">${fmt$(sc.total)}</span>
        </div>
        ${sc.rows.map(r => `
        <div class="sum-row">
          <div style="min-width:0;"><p class="sum-row-name" style="margin:0;">${esc(r.name)}</p><p class="sum-row-sub" style="margin:0;">${esc(r.sub)}</p></div>
          <span class="sum-row-total mono">${fmt$(r.total)}</span>
        </div>`).join('')}
      </div>`).join('')}
    <div style="height:80px;"></div>
  </div>`;
}

// =============================================================
// RENDER - DEAL ANALYZER
// =============================================================
function calcDeal() {
  const repairs = calcGrandTotal();
  const arv     = parseFloat(S.dealARV) || 0;
  const purchase= parseFloat(S.dealPurchase) || 0;
  const weeks   = parseInt(S.dealWeeks) || 12;
  const holdCost = Math.round(purchase * 0.015 * (weeks / 52) * 12); // 1.5% monthly
  const basis   = purchase + repairs + holdCost;
  const profit  = arv - basis;
  const roi     = basis > 0 ? (profit / basis * 100) : 0;
  const verdict = profit > 15000 ? 'Strong deal' : profit > 0 ? 'Thin margin' : 'Losing deal';
  const vColor  = profit > 15000 ? 'var(--good)' : profit > 0 ? '#d97706' : '#ef4444';
  const profitColor = profit > 0 ? 'var(--good)' : '#ef4444';
  const total = arv || (basis > 0 ? basis * 1.2 : 100000);
  const purW  = total ? Math.min((purchase/total)*100,100) : 0;
  const repW  = total ? Math.min((repairs/total)*100,100) : 0;
  const holW  = total ? Math.min((holdCost/total)*100,100) : 0;
  const proW  = total && profit > 0 ? Math.min((profit/total)*100,100) : 0;
  return {repairs, arv, purchase, weeks, holdCost, basis, profit, roi, verdict, vColor, profitColor, purW, repW, holW, proW};
}

function toggleGroup(custKey) {
  const scrollEl = document.getElementById('scroll-area');
  const st = scrollEl?.scrollTop || 0;
  const wasExpanded = S.expandedGroups.has(custKey);
  if (wasExpanded) S.expandedGroups.delete(custKey);
  else S.expandedGroups.add(custKey);
  render();
  requestAnimationFrame(() => {
    const sa = document.getElementById('scroll-area');
    if (!sa) return;
    if (wasExpanded) {
      sa.scrollTo(0, Math.min(st, sa.scrollHeight));
    } else {
      const card = sa.querySelector('[data-custkey="' + custKey + '"]');
      if (card) {
        const saRect = sa.getBoundingClientRect();
        const cardRect = card.getBoundingClientRect();
        const target = sa.scrollTop + cardRect.top - saRect.top - 10;
        sa.scrollTo({top: Math.max(0, target), behavior: 'smooth'});
      }
    }
  });
}

function toggleItem(key) {

  else clearNAForItem(key); // a checked repair contradicts "no action needed"
  scheduleSave();
  render();
  if (S.items[key]?.checked) {
    setTimeout(() => document.querySelector(`[data-key="${key}"] .qty-input`)?.focus(), 50);
  }

function clearNAForItem(key) {
  const [instId, itemId] = parseKey(key);
  for (const [stId, sec] of Object.entries(S.sections)) {
    if (!sec.instances?.some(i => i.id === instId)) continue;
    for (const gid of SECTION_TYPES[stId].groups) {
      const inGroup = GROUPS[gid]?.items.includes(itemId)
        || (S.customItems[`${instId}:${gid}`] || []).some(c => c.id === itemId);
      if (inGroup) {
        const na = S.items[`NA:${instId}:${gid}`];
        if (na?.checked) na.checked = false;
      }
    }
    return;
  }
}

// SERIAL NUMBER CAPTURE — manual entry + best-effort OCR scan
// =============================================================
function editSerial(key) {
  showPromptModal('Serial number', 'e.g. 4820A77', S.serials[key] || '', val => {
    // Strip any typed "S/N" prefix — the badge already labels it
    S.serials[key] = val.toUpperCase().replace(/^S\/?N[-:#.\s]*/,'');
    scheduleSave();
    render();
  });

let _tessPromise = null;
function loadTesseract() {
  if (window.Tesseract) return Promise.resolve(window.Tesseract);
  if (!_tessPromise) _tessPromise = new Promise((res, rej) => {
    const sc = document.createElement('script');
    sc.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js';
    sc.onload = () => res(window.Tesseract);
    sc.onerror = () => { _tessPromise = null; rej(new Error('offline')); };
    document.head.appendChild(sc);
  });
  return _tessPromise;
}

// Pull the most serial-looking token out of OCR text. Label formats vary, so
// prefer an explicit "S/N:" prefix, then fall back to long alphanumeric runs.
function extractSerial(text) {
  const up = String(text || '').toUpperCase();
  const tagged = up.match(/\b(?:S\/?N|SER(?:IAL)?\.?\s*(?:NO|NUM|#)?)[:.#\s]*([A-Z0-9][A-Z0-9\-]{4,})/);
  if (tagged) return tagged[1];
  const tokens = up.match(/\b[A-Z0-9][A-Z0-9\-]{6,}\b/g) || [];
  const cands = tokens.filter(t => (/\d/.test(t) && /[A-Z]/.test(t)) || /^[\d\-]{8,}$/.test(t));
  cands.sort((a, b) => b.length - a.length);
  return cands[0] || null;
}

async function scanSerial(key, dataUrl) {
  try {
    showToast('Scanning photo for serial…');
    const T = await loadTesseract();
    const {data} = await T.recognize(dataUrl, 'eng');
    const serial = extractSerial(data?.text);
    if (S.serials[key]) return; // user typed one while we were scanning
    if (serial) {
      S.serials[key] = serial;
      scheduleSave();
      if (!S.overlay) render();
      showToast(`Serial detected: ${serial}`, {label:'Edit', fn:() => editSerial(key)});
    } else {
      showToast('No serial found — tap “+ serial no.” to add it');
    }
  } catch {
    // OCR unavailable (offline / CDN blocked) — manual entry still works
  }
}

// Room management
function findInstance(stId, instId) {
  return S.sections[stId]?.instances?.find(i => i.id === instId) || null;
}
function findInstanceName(instId) {
  for (const sec of Object.values(S.sections)) {
    const inst = sec.instances?.find(i => i.id === instId);
    if (inst) return inst.name;
  }
  return instId;
}
function addRoom(stId) {
  const stDef = SECTION_TYPES[stId];
  if (!stDef) return;
  const insts = S.sections[stId]?.instances || [];
  const singMap = {bathroom:'Bathroom', bedroom:'Bedroom', living:'Living Area'};
  const sing = singMap[stId] || stDef.label;
  const n = insts.length + 1;
  const id = `${stId}_${Date.now()}`;
  const name = `${sing} ${n}`;
  if (!S.sections[stId]) S.sections[stId] = {instances:[]};
  S.sections[stId].instances.push({id, name});
  // initialize item keys for new instance
  for (const gid of stDef.groups) {
    const g = GROUPS[gid];
    if (!g) continue;
    for (const iid of g.items) {
      const key = mkKey(id, iid);
      if (!S.items[key]) S.items[key] = {checked:false, qty:''};
    }
  }
  scheduleSave();
  S.overlay = null;
  // navigate to the new room if we're on a multi section
  const sects = activeSections();
  const si = sects.findIndex(s => s.stId === stId);
  if (si >= 0) {
    S.sectionIdx = si;
    S.roomIdx = S.sections[stId].instances.length - 1;
    S.nav = 'walk';
  }
  render();
}

function removeRoom(stId, idx) {
  const insts = S.sections[stId]?.instances || [];
  if (stId === 'bathroom' && insts.length <= 1) { showToast('Cannot remove last bathroom'); return; }
  const inst = insts[idx];
  if (!inst) return;
  insts.splice(idx, 1);
  // clean up item state for removed instance
  const prefix = inst.id + ':';
  for (const k of Object.keys(S.items)) { if (k.startsWith(prefix)) delete S.items[k]; }
  for (const k of Object.keys(S.photos)) { if (k.startsWith(prefix)) delete S.photos[k]; }
  for (const k of Object.keys(S.customItems)) { if (k.startsWith(prefix)) delete S.customItems[k]; }
  for (const k of Object.keys(S.serials)) { if (k.startsWith(prefix)) delete S.serials[k]; }
  S.roomIdx = Math.max(0, Math.min(S.roomIdx, insts.length - 1));
  scheduleSave();
  render();
}

function renameRoom(stId, idx) {
  const inst = S.sections[stId]?.instances?.[idx];
  if (!inst) return;
  showPromptModal('Rename Room', 'e.g. Master Bath', inst.name, name => {
    inst.name = name;
    scheduleSave();
    render();
  });
}

// =============================================================
// PARTIAL UPDATE (avoid full re-render on qty input)
// =============================================================
function updateTotalsInPlace(changedKey) {
  // Update line item total
  const card = document.querySelector(`[data-key="${changedKey}"]`);
  if (card) {
    const [instId, itemId] = parseKey(changedKey);
    const t = calcItemTotal(instId, itemId);
    const el = card.querySelector('.item-total');
    if (el) { el.textContent = t>0?fmt$(t):'—'; el.className = `item-total ${t>0?'has-val':'no-val'} mono`; }
    // also patch group total
    const groupCard = card.closest('.group-card');
    if (groupCard) {
      const custKey = groupCard.dataset.custkey;
      if (custKey) {
        const [gInstId, gid] = custKey.split(':');
        const gt = calcGroupTotal(gInstId, gid, S.customItems[custKey]);
        const gte = groupCard.querySelector('.group-total');
        if (gte) { gte.textContent = gt>0?fmt$(gt):'—'; gte.className = `group-total ${gt>0?'has-val':'no-val'} mono`; }
      }
    }
  }
  // Update grand total
  const gt = document.querySelector('.hdr-total-num');
  if (gt) gt.textContent = fmt$(calcGrandTotal());
  // Update progress
  const {total, done} = calcProgress();
  const pf = document.querySelector('.progress-fill');
  if (pf) pf.style.width = `${total?Math.round(done/total*100):0}%`;
  const pl = document.querySelector('.progress-label');
  if (pl) pl.textContent = `${done}/${total} groups`;
  // Update section tab subtotals
  const sects = activeSections();
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    if (i >= sects.length) return;
    const tot = calcSectionTotal(sects[i].stId);
    let amtEl = btn.querySelector('.tab-amt');
    if (tot > 0) {
      if (!amtEl) { amtEl = document.createElement('span'); amtEl.className = 'tab-amt'; btn.appendChild(amtEl); }
      amtEl.textContent = fmt$(tot);
    } else if (amtEl) {
      amtEl.remove();
    }
  });
}

// =============================================================
// IMAGE COMPRESSION
// =============================================================
function compressImage(file, maxDim=1600, q=0.82) {
  return new Promise(res => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const r = Math.min(maxDim/img.width, maxDim/img.height, 1);
        const c = document.createElement('canvas');
        c.width = Math.round(img.width*r); c.height = Math.round(img.height*r);
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        res(c.toDataURL('image/jpeg', q));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// =============================================================
// EXPORT
// =============================================================
async function doExport() {
  if (typeof XLSX === 'undefined' || typeof JSZip === 'undefined') {
    showToast('Export library not loaded — reconnect once and retry');
    return;
  }
  closeOverlay();
  showToast('Building export…');

  const wb = XLSX.utils.book_new();
  const ws = {};
  let row = 0;
  const merges = [];

  const s = (font, fill, align) => ({
    font: {name:'Calibri', ...font},
    fill: fill ? {patternType:'solid', fgColor:{rgb:fill}} : undefined,
    alignment: {wrapText:false, ...align},
  });
  const cell = (r, c, v, style, fmt) => {
    const addr = XLSX.utils.encode_cell({r, c});
    ws[addr] = {v, t:typeof v==='number'?'n':'s', s:style};
    if (fmt) ws[addr].z = fmt;
  };
  const merge = (r, c1, c2) => merges.push({s:{r, c:c1}, e:{r, c:c2}});

  // Title
  cell(row,0,'SPARK HOMES — REPAIR ESTIMATE', s({bold:true,sz:14,color:{rgb:'FFFFFF'}},'111827',{horizontal:'center',vertical:'center'}));
  merge(row,0,4); row++;
  cell(row,0,`Property: ${S.projectName}     Date: ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`,
    s({sz:10,color:{rgb:'6B7280'}},'F9FAFB',{horizontal:'center'}));
  merge(row,0,4); row++; row++;

  const processSection = (label, rows) => {
    if (!rows.length) return;
    cell(row,0,label.toUpperCase(), s({bold:true,sz:11,color:{rgb:'FFFFFF'}},'EA580C',{vertical:'center'}));
    for (let c=1;c<5;c++) cell(row,c,'',s({},'EA580C'));
    merge(row,0,4); row++;
    ['Repair Item','Unit','Unit Cost','Qty','Estimate'].forEach((h,c) =>
      cell(row,c,h, s({bold:true,sz:10},'FFF7ED',{horizontal:c>=2?'right':'left'})));
    row++;
    let secTot = 0;
    rows.forEach(({name, unit, cost, qty, total}) => {
      cell(row,0,name, s({sz:10},'FFFFFF'));
      cell(row,1,unit, s({sz:10},'FFFFFF'));
      cell(row,2,cost, s({sz:10},'FFFFFF',{horizontal:'right'}), '"$"#,##0.00');
      cell(row,3,parseFloat(qty)||0, s({sz:10},'FFFFFF',{horizontal:'right'}));
      cell(row,4,total, s({sz:10},'FFFFFF',{horizontal:'right'}), '"$"#,##0');
      secTot += total; row++;
    });
    cell(row,0,`${label} Total`, s({bold:true,sz:10,color:{rgb:'C2410C'}},'FFF7ED'));
    merge(row,0,3);
    for (let c=1;c<4;c++) cell(row,c,'',s({},'FFF7ED'));
    cell(row,4,secTot, s({bold:true,sz:10,color:{rgb:'C2410C'}},'FFF7ED',{horizontal:'right'}), '"$"#,##0');
    row++; row++;
  };

  for (const [stId, stDef] of Object.entries(SECTION_TYPES)) {
    const insts = S.sections[stId]?.instances || [];
    for (const inst of insts) {
      const rows = [];
      for (const gid of stDef.groups) {
        const g = GROUPS[gid];
        if (!g) continue;
        const custKey = `${inst.id}:${gid}`;
        const customs = S.customItems[custKey] || [];
        const allItems = [...g.items.map(iid=>({iid,custom:false})), ...customs.map(c=>({iid:c.id,custom:true,def:c}))];
        for (const {iid, custom, def} of allItems) {
          if (S.deletedItems[mkKey(inst.id,iid)]) continue;
          const ss = S.items[mkKey(inst.id,iid)];
          if (!ss?.checked || !parseFloat(ss.qty)) continue;
          const cost = custom ? def.cost : getPrice(iid);
          const name = custom ? def.name : getItemName(iid);
          const unit = custom ? def.unit : getItemUnit(iid);
          const total = custom ? parseFloat(ss.qty)*cost : calcLineTotal(iid, ss);
          rows.push({name, unit, cost, qty:ss.qty, total});
        }
      }
      const label = stDef.multi ? inst.name : stDef.label;
      processSection(label, rows);
    }
  }

  const grand = calcGrandTotal();
  cell(row,0,'TOTAL ESTIMATE', s({bold:true,sz:13,color:{rgb:'FFFFFF'}},'111827',{horizontal:'center'}));
  merge(row,0,3);
  for (let c=1;c<4;c++) cell(row,c,'',s({},'111827'));
  cell(row,4,grand, s({bold:true,sz:13,color:{rgb:'FFFFFF'}},'111827',{horizontal:'right'}), '"$"#,##0');

  // Captured serial numbers
  const serialEntries = Object.entries(S.serials||{}).filter(([,v]) => v);
  if (serialEntries.length) {
    row += 2;
    cell(row,0,'SERIAL NUMBERS', s({bold:true,sz:11,color:{rgb:'FFFFFF'}},'374151',{vertical:'center'}));
    for (let c=1;c<5;c++) cell(row,c,'',s({},'374151'));
    merge(row,0,4); row++;
    for (const [key, serial] of serialEntries) {
      const [instId, itemId] = parseKey(key);
      cell(row,0,getItemName(itemId), s({sz:10},'FFFFFF'));
      cell(row,1,findInstanceName(instId), s({sz:10},'FFFFFF'));
      cell(row,2,serial, s({sz:10,bold:true},'FFFFFF'));
      cell(row,3,'',s({},'FFFFFF')); cell(row,4,'',s({},'FFFFFF'));
      row++;
    }
    row--;
  }

  ws['!ref'] = XLSX.utils.encode_range({s:{r:0,c:0},e:{r:row,c:4}});
  ws['!cols'] = [38,16,12,10,14].map(w=>({wch:w}));
  ws['!merges'] = merges;
  XLSX.utils.book_append_sheet(wb, ws, 'Estimate');

  const baseName = `Repair-Estimate-${S.projectName.replace(/[^a-z0-9]/gi,'_')}-${new Date().toISOString().split('T')[0]}`;
  const photoEntries = Object.entries(S.photos||{}).filter(([,a])=>a?.length>0);

  if (!photoEntries.length) {
    XLSX.writeFile(wb, `${baseName}.xlsx`);
    showToast('Export complete');
    return;
  }

  const zip = new JSZip();
  zip.file(`${baseName}.xlsx`, XLSX.write(wb, {bookType:'xlsx', type:'array'}));
  const folder = zip.folder('photos');
  photoEntries.forEach(([key, photos]) => {
    const [instId, itemId] = parseKey(key);
    const clean = (str) => String(str).replace(/[^a-z0-9]/gi,'_').slice(0,30);
    const prefix = `${clean(findInstanceName(instId))}_${clean(getItemName(itemId) || itemId)}`;
    const serial = S.serials[key] ? `_SN-${clean(S.serials[key])}` : '';
    photos.forEach((ph, i) => {
      const ext = (ph.dataUrl.split(';')[0].split('/')[1]||'jpg').replace('jpeg','jpg');
      folder.file(`${prefix}${serial}_${i+1}.${ext}`, ph.dataUrl.split(',')[1], {base64:true});
    });
  });

  const blob = await zip.generateAsync({type:'blob'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${baseName}.zip`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showToast('Export complete');
}

// =============================================================
// TOAST
// =============================================================
let _toastTimer, _toastAction = null;
function showToast(msg, action) {
  let el = document.getElementById('toast');
  if (!el) { el = document.createElement('div'); el.id='toast'; document.body.appendChild(el); }
  _toastAction = action?.fn || null;
  el.className = action ? 'toast has-action' : 'toast';
  el.innerHTML = esc(msg) + (action ? `<button class="toast-action" onclick="runToastAction()">${esc(action.label)}</button>` : '');
  el.style.opacity = '1';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { if (el) { el.style.opacity='0'; el.className='toast'; } }, action ? 4000 : 2000);
}
function runToastAction() {
  const fn = _toastAction;
  _toastAction = null;
  const el = document.getElementById('toast');
  if (el) { el.style.opacity='0'; el.className='toast'; }
  if (fn) fn();
}

// =============================================================
// BOOT
// =============================================================
(function boot() {
  S.globalPrices = loadGlobalPrices();
  const projects = loadAllProjects();
  if (projects.length > 0) {
    loadProjectIntoState(projects[0]);
  } else {
    S.projectId   = `proj_${Date.now()}`;
    S.projectName = 'New Estimate';
    S.sections    = defaultSections();
    ensureItemKeys();
    saveCurrentProject();
  }
  render();
  // visibilitychange fires on document (it does not reach window in Safari)
  document.addEventListener('visibilitychange', () => { if (document.hidden) saveCurrentProject(); });
  window.addEventListener('pagehide', saveCurrentProject);
})();
</script>
